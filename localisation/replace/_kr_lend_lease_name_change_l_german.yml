 #country_l_english
 ARMY_EXPERIENCE_DESC: "Wenn Ihre Ausrüstung im Kampf eingesetzt wird, sammeln Sie Armee-Erfahrung. Das bedeutet, dass Sie Armee-Erfahrung sammeln können, wenn Ihre §HDivisions§! in den Kampf ziehen oder wenn Sie §H$lend_lease_string_caps$§! an die Kriege Ihrer Verbündeten geschickt haben.\nDu sammelst auch Erfahrung durch die Durchführung von §HArmee Übungen§! mit Truppen, die mindestens Level $UNIT_TRAINING_LEVEL|Y$ haben, und durch bestimmte §HNationale Schwerpunkte§!. Einige §HMinister§! können die gesammelte Erfahrung erhöhen.\n\nArmee Erfahrung ist erforderlich, um Ihre §HDivision-Vorlagen§ zu erstellen und zu ändern!"
 AIR_EXPERIENCE_DESC: "Wenn Ihr Flugzeug in Missionen oder Übungen in §HPilotübungen§! gegen den Feind kämpft, sammeln Sie Flugerfahrung. Das bedeutet, dass Sie Flugerfahrung sammeln können, wenn Ihre §HLuftgeschwader§! in den Kampf ziehen oder wenn Sie §H$lend_lease_string_caps$§! in die Kriege Ihrer Verbündeten geschickt haben.\nBestimmte §HNationale Schwerpunkte§! verleihen zusätzliche Erfahrung und einige §HMinisters§! können die gewonnene Erfahrung erhöhen.\n\nFlugerfahrung wird genutzt, um bessere Varianten bestehender Flugzeuge zu entwickeln."

