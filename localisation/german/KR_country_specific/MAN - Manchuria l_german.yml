### Characters ###

#關向應
MAN_guan_xiangying: "Guan Xiangying"
MAN_guan_xiangying_bio: "Guan Xiangying, der aus einer mandschurischen Familie des Guerjia-Clans stammte, erlebte die Schrecken des Imperialismus hautnah, als er in einer von Japan finanzierten Druckerei schuftete. Im Alter von 22 Jahren trat er unter der Anleitung von Li Zhenying einer sozialistischen Jugendliga bei und arbeitete in einer Zelle der Kuomintang in Shanghai. 1925 studierte er in Paris, kehrte jedoch während der Bewegung vom 30. Mai zurück und unterstützte als Gewerkschaftsorganisator die sozialistischen Kräfte im Nordfeldzug. Nach dem Zusammenbruch der Nationalen Revolutionsarmee kehrte er in die Provinz Fengtian zurück, mit dem Auftrag, lokalen sozialistischen Agenten beim Aufbau von Widerstandszellen zu helfen."
MAN_guan_xiangying_leader_desc: "§YGeboren:§! §L10. September 1902, in Daguanjia, Jinzhou, Bezirk Shengjing, Qing-Reich§!\n§YHintergrund:§! §L$MAN_guan_xiangying_bio$\n\nDie Befreiung der Mandschurei durch ausländische Truppen hat Guan in eine unangenehme Lage gebracht. Obwohl er ethnisch gesehen ein Mandschu ist, identifiziert er sich mit der übergeordneten chinesischen Identität. Doch die Besatzungsmächte haben auf einer unabhängigen Mandschurei bestanden, und Vorsitzender Guan hat widerwillig zugestimmt, an der Spitze einer neuen Regierung mit der neu gegründeten Sozialistischen Partei der Mandschurei zu stehen.\n\nIn diese ungewollten Umstände gedrängt, bemüht sich Guan widerwillig um die Schaffung einer neuen mandschurischen Identität, die auf der multiethnischen Zusammensetzung der Region und den neuen sozialistischen Bindungen basiert. Viele Widerstandskämpfer fühlen sich durch die Gründung eines unabhängigen mandschurischen Staates betrogen, und der chinesische Nationalismus hält an. Insgeheim hofft Guan, dass eine Wiedervereinigung mit China zustande kommt und er von der Last befreit wird, eine künstliche Identität aufbauen zu müssen, an die er selbst nicht glaubt.§!"
MAN_guan_xiangying_commander_desc: "§YGeboren:§! §L10. September 1902, in Daguanjia, Jinzhou, Bezirk Shengjing, Qing-Reich§!\n§YAusrichtung:§! §rLiga der chinesischen Syndikalisten§!\n§YHintergrund:§! §L$MAN_guan_xiangying_bio$§!\n\n§YAnmerkungen: Als langjähriger Guerilla-Befehlshaber hatte er einige Schwierigkeiten, sich an die formale Befehlsgewalt im Feld anzupassen, aber er hat sich als schnell lernfähig erwiesen.§!"

#趙欣伯
MAN_zhao_xinbo: "Zhao Xinbo"
MAN_zhao_xinbo_leader_desc: "§YGeboren:§! §L1890, im Kreis Wanping, Provinz Zhili, Großes Qing§!\n§YHintergrund:§! §LDer junge Zhao Xinbo, ein Mandschu-Bannermann der kaiserlichen Garde in den letzten Tagen des Großen Qing, schrieb sich an der Beiyang-Universität in Tianjin ein. Inmitten der wachsenden Turbulenzen in Xinhai schloss er sich der Beijing Wenming New Theatre Troupe als weiblicher Schauspieler und der revolutionären Tongmenghui an.\n\nNach dem Scheitern der Zweiten Revolution floh Zhao nach Dalian. Er wurde Chinesisch-Lehrer für japanische Studenten, bevor er sich erfolgreich für Jura an der Meiji-Universität einschrieb. Dort war er der erste chinesische Student, der 1925 an der Kaiserlichen Universität Tokio den Doktortitel in Jura erwarb. Da er stark unter japanischem Einfluss stand, war er nach seinem Abschluss Rechtsberater von Zhang Zuolin. Unter der Schirmherrschaft von Zhang Xueliang gründete er die Northeast Law Research Association (Vereinigung zur Erforschung des Rechts im Nordosten).\n\nAls ansonsten unbedeutende, pro-japanische Figur in der Fengtian-Clique war er dennoch bereit, den Sprung zu wagen, als ausländische Behörden beschlossen, einen neuen mandschurischen Staat zu gründen. Zhao erwies sich als eifriger Mitstreiter und gründete das Lokale Wartungskomitee der Provinz Liaoning, das eine Unabhängigkeitserklärung für die Mandschurei verkündete.\n\nDer sogenannte \"Geburtshelfer der Mandschurei\" wurde mit der Unterstützung einer wackeligen \"Demokratischen Liga der Mandschurei\" mühelos zum Präsidenten gewählt, doch die Zukunft seiner Republik bleibt äußerst unsicher, was durch seine gewohnheitsmäßigen Veruntreuungen noch verschärft wird. Hinter einer Fassade der Demokratie, die darauf ausgelegt ist, ausländischen Gönnern zu gefallen, verbirgt sich eine unpopuläre Oligarchie unter der Führung eines Präsidenten von zweifelhafter Kompetenz.\n\nZhao versucht, das Mandschurische als eine gemeinsame Identität darzustellen, die auf dem demokratischen Charakter der chinesischen Tradition beruht – im Gegensatz zu der angeblichen Tyrannei, die seiner Meinung nach südlich der Großen Mauer herrscht. Doch nur die Zeit wird zeigen, ob Zhaos mandschurische Nation Bestand haben wird oder ob die Geschichte ihre Existenz verwerfen und die Mandschurei als gescheiterten Versuch der Schaffung einer neuen Nation verbuchen wird.§!"

#富雙英
MAN_fu_shuangying: "Fu Shuangying"
MAN_fu_shuangying_bio: "Fu Shuangying, ein ethnischer Mandschu aus der Mandschurei, besuchte die Fengtian-Armeeschule, bevor er 1918 die Militärakademie in Baoding abschloss. Schon bald wurde er Mitglied der Fengtian-Armee und diente als Ausbilder dort, wo er einst die Grundschule besuchte. Als ausgebildeter Infanteriekommandeur diente er in einem solchen Regiment im 2. Zhifeng-Krieg.\n\nIrgendwann fielen seine Leistungen seinem Kommandeur Zhang Xueliang auf. Da er während des Vierten Zhili-Fengtian-Krieges nicht besonders erfolgreich war, wurde er auf verschiedenen Positionen im Hintergrund eingesetzt und arbeitete in der Logistik. Zu diesem Zweck diente er als Direktor des Bergbaubüros von Jingxing und als Stabsoffizier in der Regierung von Fengtian."
MAN_fu_shuangying_notes: "§YAnmerkungen: Obwohl er einige pro-japanische Verbindungen hat, ist Fu kein Mitglied der Shikan-Clique oder der Concordia-Vereinigung.§!"
MAN_fu_shuangying_commander_desc: "§YGeboren:§! §L1894, in Liaoyang, Bezirk Shengjing, Großes Qing§!\n§YAusrichtung:§! §LUnpolitisch§!\n§YMilitärkarriere:§! §L$MAN_fu_shuangying_bio$§!\n\n$MAN_fu_shuangying_notes$"
MAN_fu_shuangying_leader_desc: "§YGeboren:§! §L1894, in Liaoyang, Bezirk Shengjing, Großes Qing§!\n§YHintergrund:§! §LFu Shuangying, ein kleinerer Befehlshaber mandschurischer Abstammung in der Fengtian-Clique, war in der alten Ordnung nichts Besonderes: ein Absolvent der angesehenen Militärakademie von Baoding mit einer wechselvollen Geschichte auf dem Schlachtfeld und einigen Verbindungen zu japanischen Interessen in der Mandschurei. Das Fehlen fester Bindungen zu den Zhangs oder Tokio, seine militärische Ausbildung und seine bürokratische Erfahrung, die er unter anderem bei der Verwaltung des Jingxing-Bergbaubüros gesammelt hatte, kamen ihm jedoch zugute, als die ausländischen Behörden nach einem Kandidaten für die Führung einer unabhängigen Mandschurei suchten.\n\nFu ist zwar weitgehend ein Aushängeschild für die Fremdherrschaft und hat selbst unter den ethnischen Mandschus eine fragwürdige Legitimität, aber er hat die Rolle dennoch mit Bravour übernommen. Als Oberhaupt der Mandschurei hat er seine Herrschaft über den Obersten Verwaltungsrat der Mandschurei konzentriert und arbeitet mit der lokalen Elite zusammen, um die Autonomie der Region zu schützen.\n\nEr erbt eine zerrüttete Mandschurei, in der japanische Investitionen abgezogen, von ausländischen Besatzern geplündert oder in den Kämpfen zerstört wurden. Obwohl erwartet wurde, dass er bei der alten Landadel- und Bürokratielobby einige Fortschritte erzielen würde, hat die Entscheidung, eine unabhängige Mandschurei zu schaffen, viele verärgert, sogar unter einigen der entschlossensten Regionalisten des Dongbei. Auf dem Land herrscht weiterhin Aufruhr, während die Wiederaufbauarbeiten beginnen.\n\nFu steht dem Projekt der Schaffung einer neuen mandschurischen Identität ambivalent gegenüber und überlässt es seinen Untergebenen, diese neue mandschurische Identität zu definieren. Seine Regierung hat ein Mandschu-Sein gefördert, das nicht durch die Abstammung von den Jurchen oder den Dienst in den Qing-Bannern definiert ist, sondern eine zusammengesetzte Nationalität darstellt, geschmiedet aus einer eklektischen Mischung aus Han, Mongolen, Hui und ethnischen Mandschu, die alle uralte Traditionen teilen, die jenseits der Großen Mauer nicht mehr gepflegt werden.§!"

