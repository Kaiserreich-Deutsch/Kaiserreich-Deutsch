### Tooltips ###

KHI_nepo_baby_purge: "§LZwar werden unsere Truppen im Zuge unserer Umstrukturierung vorübergehend in Unordnung geraten, doch werden wir nach deren Abschluss einen starken Nationalgeist erhalten.§!"
KHI_dredgery: "§LAuch wenn die Ausbaggerung des Hafens von Kyzyl Su kurzfristig mit hohen Kosten verbunden sein wird, wird uns der Ausbau der Docks und der Infrastruktur einen starken Nationalgeist verleihen und die Lieferzeit für Schmuggelware um §C15 Tage§! verkürzen.§!"
KHI_baku_warehouses_built: "Verkürzt die Lieferzeit von Schmuggelware um §C15 Tage.§!"
KHI_expanding_smuggling_network: "§LWir werden unser Schmugglernetzwerk auf ganz Europa und darüber hinaus ausweiten, ausgehend von unseren derzeitigen Aktivitäten in Baku.§!"
KHI_upgrading_idea: "§CDieser Geist wird sich mit der Zeit langsam verbessern!§!"
KHI_leaving_russian_sphere: "Mit dem Tod von Generalmajor Zaytsev bietet sich uns die Gelegenheit, das Joch der russischen Vorherrschaft abzuschütteln und die Grenzen unserer besonderen Beziehung zu unserem nördlichen Nachbarn erneut auf die Probe zu stellen!"
KHI_left_russian_sphere: "§CAufgrund der veränderten geopolitischen Lage ist Chiwa vorübergehend aus unserer Hand geglitten! Sobald wir unsere Herrschaft und unseren Schutz über das Khanat wiederhergestellt haben, wird es unter unsere Kontrolle zurückkehren.§!"

KHI_silk_road_factory_tt: "§CWenn unsere derzeitige politische Macht bei Abschluss dieses Schwerpunkts §Y125§! oder höher beträgt, werden durch diesen Schwerpunkt zusätzliche zivile Fabriken hinzukommen!§!"
KHI_transcaspian_rail_tt: "§CWenn wir Aschgabat kontrollieren, wenn dieser Schwerpunkt abgeschlossen ist, werden durch diesen Schwerpunkt zusätzliche Infrastruktur und zivile Fabriken hinzukommen!§!"
KHI_listen_to_generals_tt: "§CWenn wir mehr als §Y100.000§! Mann vor Ort haben, wird der Nationalgeist gestärkt.§!"
KR_listen_to_generals_spirit_weak_tt: "Kombinieren und verbessern Sie §YDie neue Sicherheitswache§! und §YDas Militär und der Staat§! zu §YVorrang des Militärs§!\nEffektive Veränderung:\nDivision Organisation: §G+5.0%§!\nKapitulationsgrenze: §G+10.00%§!\nPlanungsgeschwindigkeit: §G+10.0%§!\nMedaille Verleihungskosten: §G-25.0%§!\n"
KR_listen_to_generals_spirit_strong_tt: "Kombinieren und verbessern Sie §YDie neue Sicherheitswache§! und §YDas Militär und der Staat§! zu §YVorrang des Militärs§!\nEffective change:\nDivision Organisation: §G+5.0%§!\nKapitulationsgrenze: §G+20.00%§!\nPlanungsgeschwindigkeit: §G+20.0%§!\nMedaille Verleihungskosten: §G-50.0%§!\n"
KHI_council_of_wise_men_tt: "§CWenn wir §YKoshmamed Khan§!, §YGulyam Ali§!, §YShamurad Bakhshi§! oder §YMaksum Khan§! als Berater engagieren, wird der Nationalgeist gestärkt.§!"

KHI_umarrecruited_tt: "§YUmar Khan§!, gewährt (Politischer Machtzuwachs: §G+15%§!)."
KHI_muetdinrecruited_tt: "§YMuetdin Bek§!, gewährt (Aufklärung: §G+15.0%§!, Befestigungsgeschwindigkeit: §G+10.0%§!)."
