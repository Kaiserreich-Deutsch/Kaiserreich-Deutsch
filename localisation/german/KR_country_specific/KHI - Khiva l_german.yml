KHI_mediterranean_access: "§LIndem wir uns Einfluss im Mittelmeerhafen Smyrna sichern, können wir Waren aus aller Welt schmuggeln, was uns alle 100 Tage eine zufällig ausgewählte Schmuggelmöglichkeit verschafft. Durch die weitere Ausweitung unseres Einflusses im Mittelmeerraum lassen sich mächtige neue Routen freischalten.§!"
KHI_ocean_opened: "Eröffnet neue und lukrativere Handelsmöglichkeiten für unsere Schmuggelroute im Mittelmeerraum!"

KHI_prep_intro_tooltip: "§RWir müssen gezielte Entscheidungen treffen und Schwerpunkte setzen, um unsere Vorbereitungen zu verbessern, bevor es zu einem Konflikt kommt!§!"

