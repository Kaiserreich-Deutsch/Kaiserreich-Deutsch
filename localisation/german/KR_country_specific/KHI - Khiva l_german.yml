### Focus ###
KHI_focus: "Schwerpunktbaum von [KHI.GetName]"

KHI_one_khanate_two_khans: "Ein Khanat, zwei Khane"
KHI_one_khanate_two_khans_desc: "Die Qungrat-Khans sind seit langem ein nützliches Instrument für unser Regime, da sie uns jene Legitimität verleihen, die einer reinen Stammesherrschaft fehlen würde. In den letzten Tagen hat Sayid Abdullah jedoch lautstark mehr Verantwortung gefordert. Während Zugeständnisse an den Marionettenmonarchen Junaid Khans eisernen Griff um das Khanat potenziell gefährden, könnte die Förderung des Ansehens von Sayid Abdullah Chiwa ein echtes Symbol geben, für das es sich einzusetzen lohnt."

KHI_listen_to_the_councilors: "Den Ratsmitgliedern zuhören"
KHI_listen_to_the_councilors_desc: "Viele der etablierten Verwaltungsbeamten und Berater in Chiwa haben kaum etwas mit ihrem Anführer gemeinsam; sie sind gezwungen, den Befehlen eines groben turkmenischen Kriegsherrn zu folgen, der nur über rudimentäre Lese- und Schreibkenntnisse verfügt und wenig Verständnis für die Feinheiten der Bürokratie aufbringt. Junaid Khan ist sich bewusst, dass er nicht allein regieren kann, und verlässt sich daher zunehmend auf den Rat seiner engsten Berater, die den grauhaarigen Autokraten in eine Phase relativer Stabilität geführt haben."

KHI_gateway_into_CA: "Tor nach Zentralasien"
KHI_gateway_into_CA_desc: "Da wir direkt gegenüber von Baku am Kaspischen Meer liegen, fungiert unser kleines Khanat als Dreh- und Angelpunkt zwischen Ost und West. In den letzten Jahren haben die europäischen Mächte den letzten Überresten des russischen Kolonialabenteuers mit zunehmender Neugier und Interesse zugesehen, und dank unserer geschickten Manipulation der russischen Aufseher und der gelegentlichen Verlegung von Fracht werden wir davon profitieren."

KHI_attract_adventurers_and_exiles: "Abenteurer und Verbannte anziehen"
KHI_attract_adventurers_and_exiles_desc: "Es gibt eine Vielzahl von Männern auf dieser Welt, die sich kaum mehr wünschen als die Chance auf Gold und Ruhm oder einfach nur einen Neuanfang. Schließlich hat der russische Bürgerkrieg viele hervorgebracht, die die Unberechenbarkeit von Junaid Khans Regierung über alles schätzen, und viele verfügen über unschätzbare Kampferfahrung in den Steppen. Wen interessiert es schon, dass sie vor Jahrzehnten die Waffen gegen uns erhoben haben? Was jetzt zählt, ist, dass sie bereit sind, heute gemeinsam mit uns zu kämpfen."

KHI_our_clandestine_supporters: "Unsere heimlichen Unterstützer"
KHI_our_clandestine_supporters_desc: "Zwar ist unsere Regierung offiziell auch nach ihrer verheerenden Niederlage im Weltkrieg fest im russischen Einflussbereich verankert geblieben, doch gibt es in einigen dunklen Hinterzimmern in Berlin und Istanbul seit langem Bestrebungen, im Falle eines weiteren großen europäischen Krieges einen Aufstand in Zentralasien anzuzetteln. Wenn wir die Überreste der russischen Vorherrschaft abschütteln wollen, brauchen wir die Hilfe ihrer Feinde, sowohl in Form von Informationen als auch von Material."

KHI_caspian_gunrunners: "Ausbau des Netzwerks"
KHI_caspian_gunrunners_desc: "Die Gegner von Junaid Khan haben ihn oft als Banditen oder Kriminellen bezeichnet. Auch wenn diese Bezeichnungen dem Edlen Befehlshaber nicht gerecht werden, ist es doch keine Lüge, dass er pragmatischerweise Verbindungen zu Schmugglern und skrupellosen Waffenhändlern geknüpft hat, die anbieten, zweifelhaft beschaffte ausländische Waffen über das Kaspische Meer zu transportieren … natürlich gegen Bezahlung."

KHI_expand_kyzyl_su: "Ausbau der Häfen von Kyzyl Su"
KHI_expand_kyzyl_su_desc: "Vor über 200 Jahren landete der russische Befehlshaber Aleksandr Bekovich-Cherkassky mit einer Expedition an der Mündung des ausgetrockneten Flusses Uzboy, um das Khanat Chiwa zu vernichten. Während unsere gewitzten Vorfahren diesen törichten Angreifer besiegten, wurde sein Landeplatz für fast ein Jahrhundert zum Tor für russischen Einfluss und russische Investitionen. Heute ist der Hafen von Kyzyl Su eine wichtige Verbindung zwischen Europa und Asien, und sein Ausbau wird uns gute Dienste leisten."

KHI_connect_transcaspia: "Transkaspien verbinden"
KHI_connect_transcaspia_desc: "Die Transkaspische Eisenbahn ist sowohl eine Lebensader für unser Land als auch ein Symbol für unsere jahrelange Unterwerfung unter Moskau und verbindet die großen Städte Zentralasiens mit den Handelsnetzen am Kaspischen Meer. Da die Stadt Aschgabat jedoch unter persischer Kontrolle steht, wurden die Eisenbahnstrecken geteilt, und unsere Fracht wird immer strengeren Kontrollen unterzogen. Durch den Bau einer kleinen Verbindungsstrecke zur Umgehung dieses Hindernisses könnten wir die Stabilität unseres zentralasiatischen Handelsnetzes festigen."

KHI_hire_foreign_engineers: "Ausländische Ingenieure einstellen"
KHI_hire_foreign_engineers_desc: "Die traurige Wahrheit ist, dass es in Chiwa nur wenige gibt, die sich in Fragen der modernen Technik gut auskennen, und daher wurden unsere Bemühungen, irgendeine Art von Industrie oder Rüstungswerk aufzubauen, durch technische Unzulänglichkeiten sowie wiederholte Rückschläge und Misserfolge behindert. Die einfachste Lösung wäre, eine Gruppe erfahrener Ingenieure aus Europa und Anatolien einzustellen, die unsere Arbeiten leiten."

KHI_rebuild_manufactories: "Manufakturen wieder aufbauen"
KHI_rebuild_manufactories_desc: "Chiwa war nie eine Industriestadt und litt, wie der größte Teil Zentralasiens, unter Investitionsmangel und einer kolonialen Wirtschaftsstruktur, die das industrielle Wachstum hemmt. Auf dem Höhepunkt der deutschen Investitionen im Osten entstanden jedoch in Kyzyl Su und in Chiwa selbst einige Leichtindustriebetriebe, und die verblassenden Überreste dieser Entwicklungsphase sind noch immer vorhanden und warten darauf, genutzt zu werden."

KHI_reinforce_khiva: "Chiwa verstärken"
KHI_reinforce_khiva_desc: "Chiwa ist eine Stadt, die außerhalb dieser Zeit steht, isoliert und uralt, ein Relikt einer glorreichen Vergangenheit und einer Geschichte des Niedergangs und der Stagnation. Auch wenn Junaid formal von der Hauptstadt aus regiert, ist er innerhalb ihrer Mauern verwundbar, umgeben von Dissidenten und Spionen und abgeschnitten von seinen turkmenischen Anhängern. Der Ausbau der Verbindungen zwischen Chiwa und Junaids Unterstützerbasis – nämlich dem von den Turkmenen kontrollierten Hinterland des Khanats – könnte notwendig sein, wenn der Edle Befehlshaber überleben will."

KHI_unite_the_tribes: "Vereint die Stämme"
KHI_unite_the_tribes_desc: "Junaid Khan kam an die Macht im Zuge eines weitreichenden Aufstands der turkmenischen Stämme, der das Khanat von Chiwa vollständig zu zerfallen drohte. Im Zuge dieser Revolution integrierte Junaid Khan die Bürokratie der königlichen Regierung, wodurch er bei einigen der unabhängigeren turkmenischen Anführer in Ungnade fiel. Wir können es uns nicht leisten, machtlos oder schwach zu wirken und zu riskieren, die Kontrolle über die turkmenischen Stämme zu verlieren! Die rebellischen Häuptlinge werden wieder in die Reihe gebracht oder andernfalls beseitigt."

KHI_support_aral_farmers: "Unterstützt die Bauern am Aralsee"
KHI_support_aral_farmers_desc: "Die fruchtbaren Gebiete am Aralsee sind sowohl die Kornkammer unseres Khanats als auch unsere wichtigste Exportquelle. Zwar sind unsere Versuche, mit unseren Lebensmitteln auf den europäischen Markt vorzudringen, an der Abhängigkeit des mitteleuropäischen Systems von ukrainischem Getreide gescheitert, doch könnte sich die zunehmende Instabilität auf diesen Märkten und jenseits des Atlantiks als großer Segen für uns erweisen. Unsere Landwirte müssen unterstützt werden, damit sie auf diese Chance vorbereitet sind."

KHI_junaids_horsemen: "Junaids Reiter"
KHI_junaids_horsemen_desc: "Den Kern von Junaid Khans Privatarmee bildet eine Schar wild entschlossener turkmenischer Reiter – treue und engagierte Krieger, die ihrem Anführer seit den Tagen folgen, als er zum ersten Mal gegen Chiwa zog. Diese einst so großen Krieger sind jedoch in die Jahre gekommen, und ihre Tage als Kämpfer sind gezählt. Wir sollten sie dazu nutzen, eine neue Generation treuer Krieger auszubilden, die von den Siegen ihrer Vorfahren geprägt ist."

KHI_procure_advanced_designs: "Fortschrittliche Designs beschaffen"
KHI_procure_advanced_designs_desc: "Auch wenn die Kavallerie das Herzstück unserer militärischen Stärke bildet, wäre es töricht, die Spezialwaffen und die Ausrüstung außer Acht zu lassen, die während des Großen Europäischen Krieges entwickelt wurden. Wir beschäftigen Schmuggler und Händler, die uns an bestimmte Konstruktionen vermitteln können, die zwar für die Armeen Deutschlands oder Frankreichs veraltet sind, unsere Kampfflugzeuge jedoch revolutionieren würden."

KHI_ideas_of_azis_khan: "Die Ideen von Aziz Khan"
KHI_ideas_of_azis_khan_desc: "Auch wenn es niemand laut zu sagen wagt, ist Junaid Khan nicht gerade der ideologisch konsequenteste Führer, dessen Fokus selten von seinem persönlichen Patronagenetzwerk und dem Schutz der turkmenischen Clans abweicht. Um diese Lücke zu füllen, hat sein Stellvertreter Aziz Khan eine Mischung aus rigidem Militarismus, islamischem Traditionalismus und antirussischer Stimmung propagiert, um unser Regime bei allen Untertanen Junaids besser zu vermarkten."

KHI_eliminate_dissenters: "Andersdenkende beseitigen"
KHI_eliminate_dissenters_desc: "Als der schwache Khan Isfandiyar sich den Launen der Jungen Chiwiner beugte, stürzte er die Stadt in eine Zeit der Gewalt und Unruhen, die den Staat gänzlich zu zerfallen drohten. Glücklicherweise erwies sich Junaid Khan der Situation gewachsen, vertrieb die Anführer der Jadid und sicherte die Stabilität des Khanats. Er muss das Werk vollenden, das er im Frühjahr 1918 begonnen hat, indem er die letzten Überreste dieser fünften Kolonne zerschlägt, bevor sie unser Land erneut zerreißen können."

KHI_purge_nepotistic_appointments: "Vetternwirtschaft beseitigen"
KHI_purge_nepotistic_appointments_desc: "Im Laufe der Zeit hat sich unsere militärische Hierarchie mit einer wachsenden Zahl unqualifizierter Offiziere durchsetzt – den Söhnen und Neffen prominenter Krieger und führender Patriarchen. Diese blaublütigen Sprösslinge mögen zwar die richtigen Namen tragen, doch fehlt ihnen die für eine Führungsrolle erforderliche Erfahrung. Indem wir diese Personen in unbedeutende Posten versetzen und gleichzeitig die vielversprechendsten Kandidaten aus ihren Reihen für die Ausbildung auswählen, könnten wir die Qualität unserer Offiziere grundlegend verbessern."

KHI_streamline_the_command: "Kommandostruktur optimieren"
KHI_streamline_the_command_desc: "Derzeit verfügen wir über ein zweigeteiltes Militär, bestehend aus einer überwiegend usbekischen Königlichen Armee, die sich aus Milizeinheiten zusammensetzt, und einem überwiegend turkmenischen Kern aus Stammesreitern. Diese beiden Teile unseres Militärs unterstehen unterschiedlichen Befehlshabern, verfügen über getrennte Nachschubketten, kommunizieren in unterschiedlichen Codes und Sprachen und arbeiten selten gut zusammen. Indem wir die Königliche Armee vollständig in die Struktur der turkmenischen Reiter einbinden, können wir einige dieser Probleme beheben."

KHI_tip_of_the_spear: "Die Speerspitze"
KHI_tip_of_the_spear_desc: "Unsere Erfolge auf dem Schlachtfeld verdanken wir kühnen Aktionen und gewagten Manövern, mit denen wir unsere technologischen Defizite ausgeglichen haben, indem wir unsere Feinde auf eine Weise bekämpft haben, die sie weder erwartet noch darauf vorbereitet waren. Der moderne Krieg wird von kaltherzigem Metall und demoralisierten Soldaten beherrscht, die auf fremden Schlachtfeldern kämpfen und völlig unvorbereitet sind auf den unerbittlichen Siegeswillen unserer eigenen Streitkräfte."

KHI_our_fight: "Junaid Khans letzter Schachzug"
KHI_our_fight_desc: "Manche Armeen kämpfen ums Überleben, andere um die Eroberung. Manche Armeen kämpfen aus Furcht vor ihrem Befehlshaber, andere aus Liebe zu ihren Anführern. Für Junaid Khan spielt es kaum eine Rolle, ob seine Soldaten aus Furcht, Liebe, Gier oder Pflichtgefühl an seiner Seite kämpfen – Hauptsache, sie kämpfen. Die Steppen sind reif für die Eroberung, und Junaid Khan wird der Mann sein, der sie vereint – hinter einer Armee aus Außenseitern und Mördern, loyalen Stammesangehörigen und opportunistischen Söldnern."

KHI_one_khan: "Der große Vereiniger"
KHI_one_khan_desc: "Junaid Khan ist seit langem der unangefochtene Anführer der Turkmenen am Aralsee, doch seine Rolle als Führer der usbekischen Untertanen von Chiwa ist bestenfalls fragwürdig. Auch wenn er wenig persönliches Interesse daran hat, auf die Usbeken einzugehen, können wir es uns nicht leisten, dass die Hälfte unserer Bevölkerung das Gefühl hat, keinen Platz in unserer Regierung zu haben und keine Persönlichkeit zu besitzen, die sich für ihr Wohlergehen einsetzt. Wir müssen Junaid Khan als Herrscher über alle unsere Bürger und als den großen Einiger von Chiwa positionieren."

KHI_pivot_against_russia: "Streitkräfte gegen den Adler"
KHI_pivot_against_russia_desc: "Junaid Khan ist vor allem ein Krieger – und Krieger beugen sich keinen fremden Angreifern. Als die Armeen Moskaus 1929 Schwäche zeigten, bewiesen die Armeen von Chiwa Stärke. Die Geschichte wird sich wiederholen, und russisches Blut wird im Amu-Darja vergossen werden!"

KHI_forced_meritocracy: "Erzwungene Leistungsgesellschaft"
KHI_forced_meritocracy_desc: "Wenn der Anführer eines Clans im Kampf fällt, soll dann sein bevorzugter Stellvertreter seine Nachfolge antreten oder sein Sohn? Keiner von beiden, sagt Junaid Khan – derjenige, der das Banner seines Anführers hochhält und zurück in die Schlacht stürmt, ist am besten geeignet, die Führung zu übernehmen. Als die Armeen von Chiwa 1917 auf die Probe gestellt wurden, bewiesen sie ihren Mut. Als sie auf dem Höhepunkt der Taschkent-Krise erneut in den Sattel stiegen, stellte sich eine neue Generation von Männern unter Beweis. Erhebt euch, Söhne von Chiwa! Unsere Armeen werden im Feuer der Gewalt geschmiedet!"

KHI_defending_the_port: "Die Lebensader stärken"
KHI_defending_the_port_desc: "Seit den Anfängen des interkontinentalen Handels hat Chiwa seine Bedeutung und Macht durch Verbindungen zu ausländischen Reichen gesichert. Auch wenn wir in den letzten Jahrhunderten isoliert waren, haben der Ausbau unseres Hafens am Kaspischen Meer und das wachsende Interesse des Deutschen und des Osmanischen Reiches am russischen Hinterland unsere Verbindungen zum Westen wiederbelebt. Wir dürfen jetzt nicht zulassen, dass unsere Feinde unsere neu gewonnenen Verbündeten umgehen."

KHI_rally_the_clans: "Versammelt die Clans"
KHI_rally_the_clans_desc: "Junaid Khans Unterstützerbasis waren schon immer die turkmenischen Stämme am Aralsee. Angesichts der gegenwärtigen Krise müssen wir unsere Anhänger, ob jung oder alt, dazu aufrufen, sich uns anzuschließen und gemeinsam mit uns unseren nationalen Kampf zu führen. Wenn wir zulassen, dass unsere turkmenischen Verbündeten sich nicht an diesem Kampf gegen die russische Vernichtung beteiligen, würden wir mit einer Hand auf dem Rücken gefesselt um unser Leben kämpfen müssen."

KHI_unification_by_the_sword: "Vereinigung durch das Schwert"
KHI_unification_by_the_sword_desc: "Große Redner aus ganz Zentralasien haben in ihren Reden die Gerechtigkeit einer pan-türkischen Vereinigung gepriesen. Das Scheitern dieser Männer lag nicht an ihrer Überzeugung, sondern an ihrem zaghaften Beharren auf sinnlosen Dialogen und endlosen Kompromissen. Glücklicherweise haben uns solche törichten Vorstellungen nie aufgehalten. Zentralasien gehört uns, erobert mit dem Schwert, und so werden wir es auch mit dem Schwert regieren!"

KHI_lessons_from_the_rebellion: "Lehren aus der Rebellion"
KHI_lessons_from_the_rebellion_desc: "Unsere Armeen haben eindeutig bewiesen, dass sie zu Großem fähig sind, indem sie die Russen zurückgeschlagen und Zentralasien erobert haben. Diese gewalttätige und schreckliche Feuerprobe hat jedoch tiefsitzende Schwächen in unserer Armee offenbart. Nun, da wir die Kontrolle über unsere Nachbarn gesichert haben, müssen wir unsere Eroberungen überwachen und unsere Grenzen schützen – eine Aufgabe, die eine wahrhaft moderne Armee erfordert."

KHI_all_roads_lead_to_khiva: "Alle Wege führen nach Chiwa"
KHI_all_roads_lead_to_khiva_desc: "Die antiken Städte Zentralasiens entwickelten sich dank ausgedehnter Handelswege über Land von verschlafenen Dörfern zu Metropolen. Heutzutage ist die Region von Verkehrsadern durchzogen, die von unterentwickelten Straßen bis hin zu gut ausgebauten Eisenbahnstrecken reichen. Indem wir diese Routen in Richtung Chiwa umleiten, können wir die herausragende Stellung der Stadt in der Region besser sichern."
KHI_all_roads_to_khiva_state_spirit_tt: "§YKhorezm§! erhält den Modifikator §YAlle Wege führen nach Chiwa§!, der dies gewährt\n      $MODIFIER_STATE_PRODUCTION_SPEED_BUILDINGS_FACTOR$: §G+25%§!\n      $MODIFIER_LOCAL_BUILDING_SLOTS$: §G+5§!\n\n"
KHI_all_roads_to_khiva_state_spirit: "Alle Wege führen nach Chiwa"

KHI_rebuild_transcaspian_rail: "Wiederaufbau der transkaspischen Eisenbahn"
KHI_rebuild_transcaspian_rail_desc: "Als die Russen die Herrschaft über ganz Zentralasien erlangten, nutzten sie ihre uneingeschränkte Kontrolle über die Region, um die Transkaspische Eisenbahn zu errichten – eine Bahnstrecke, die diese Region vereint und unserem Reich immensen Wohlstand gebracht hat. Nun, da wir die Region beherrschen, können wir diese wichtige Infrastruktur, ein Symbol unserer Herrschaft über die Steppen, wiederaufbauen und ausbauen."

KHI_a_new_silk_road: "Eine neue Seidenstraße"
KHI_a_new_silk_road_desc: "Die Lage im Osten und im Westen ist tragisch, da Feuer und Krieg diese Regionen heimsuchen. Doch diese apokalyptische Feuersbrunst kann nicht ewig andauern, und schließlich werden diese beiden Kernländer der Zivilisation aus der Asche auferstehen, begierig nach Handel. Wir werden erneut als Vermittler zwischen Ost und West fungieren und ein Netz moderner Handelswege und Eisenbahnstrecken aufbauen, das als neue Seidenstraße dienen soll."

KHI_purge_royal_bureaucracy: "Die königliche Bürokratie ausmerzen"
KHI_purge_royal_bureaucracy_desc: "Jahrelang waren wir vom Willen der festgefahrenen königlichen Bürokratie abhängig, einem illoyalen und schwerfälligen Haufen von kriecherischen Schlangen. Nun sind unsere Rivalen vollständig vernichtet, und wir können es uns nicht leisten, von den Launen der Bürokraten in Geiselhaft genommen zu werden. Jagt die Ratten aus ihren Löchern und enthauptet die Schlange, damit die Übrigen in unserer Gegenwart zitternd kauernd zurückbleiben. In unserem neuen Khanat wird es keinen Platz geben für die Aufblähung und Stagnation, die das Versagen der alten Khans mit sich brachte."

KHI_pacify_territories: "Die Gebiete befrieden"
KHI_pacify_territories_desc: "Wir haben die Randgebiete unseres Reiches schon immer durch eine Mischung aus Zwang und Hinterzimmergeschäften beherrscht. Natürlich sind jene sanften Zugeständnisse, die für die Aufrechterhaltung des Friedens und der Loyalität unserer traditionellen Untertanen entscheidend sind, im Umgang mit den neuen Regionen unter unserer Herrschaft nicht tragbar. Wir werden jeden Widerstand durch die brutale, aber einfache Macht der Waffen brechen müssen."

KHI_a_new_coronation: "Die Krönung"
KHI_a_new_coronation_desc: "Es ist Jahrzehnte her, seit der Verräter Isfandiyar Khan versuchte, unser Reich an die russischen Hunde zu verkaufen, was nur durch den Mut von Junaid verhindert wurde. Da Junaid Khan Isfandiyar als verräterische Schlange erkannte, ersetzte er den verhassten Herrscher durch einen gefügigeren Qungrat-Khan, den schwachen und machtlosen Sayid Abdullah. Unser Marionetten-Khan hat seine begrenzte Nützlichkeit jedoch längst überlebt, und das Volk verlangt lautstark nach einer neuen Dynastie, angeführt von einem wahren Krieger-Khan."

KHI_form_a_council: "Bildet einen Rat der Weisen"
KHI_form_a_council_desc: "Junaid Khan ist bestens mit den Ältestenräten vertraut, die in Zentralasien weitgehend die Grundlage der Stammesverwaltung bilden. Schließlich erlangte Junaid zunächst als Richter und Wasserverwalter bei den Yomuden Ansehen. Wir werden die Verwaltung unseres Khanats so gestalten, dass sie der der Stämme nachempfunden ist, in der die Ältesten angesehener Familien ihre Weisheit einbringen und eine aktive Rolle bei der Regierung unseres Reiches übernehmen können."

KHI_listen_only_to_generals: "Hört nur auf die Generäle"
KHI_listen_only_to_generals_desc: "Es war die militärische Tapferkeit von Junaid Khan und seinen Untergebenen, die uns unsere Unabhängigkeit gesichert hat, und es waren der Ehrgeiz und die Genialität unserer militärischen Manöver, die uns ganz Zentralasien eingebracht haben. Warum sollten diese tapferen Männer sich den Meinungen von Männern beugen, die noch nie zu den Waffen gegriffen haben? Stattdessen werden wir einen Rat aus Junaids besten und treuesten Generälen bilden, um unser Land besser zu regieren."

KHI_rule_from_the_saddle: "Herrsche vom Sattel aus"
KHI_rule_from_the_saddle_desc: "Die meisten Männer, die sich vom Dorfwasserversorger zum Khan aller Türken hocharbeiten, beschließen, den Sattel an den Nagel zu hängen. Natürlich ist Junaid Khan nicht wie die meisten Männer: Seine Krone ist kein mit Edelsteinen besetztes Diadem, sondern der Papakh eines Soldaten. Junaid wird nicht denselben Fehler begehen wie der verstorbene Isfandiyar, der in seinem Palast saß, während sich eine Rebellion gegen seine Herrschaft zusammenbraute. Er wird vom Sattel aus regieren, und er wird im Sattel sterben!"

### Decisions ###
KHI_war_preparation: "Kriegsvorbereitungen"
KHI_war_preparation_desc: "Die Kämpfe, die während des russischen Bürgerkriegs und der Taschkent-Krise in Zentralasien ausbrachen, haben eines eindeutig bewiesen: Angesichts von Maschinengewehrfeuer und Artilleriefeuer halten selbst die eifrigsten Krieger nicht lange durch. Es ist daher keine Überraschung, dass sich die Aufmerksamkeit aller zentralasiatischen Mächte auf die Modernisierung und Zentralisierung ihrer Armeen richtet, bevor in der Region erneut ein Konflikt ausbricht, der jede der rücksichtslosen Basmachi-Armeen auf die Probe stellen wird.\n\nUnser aktueller Vorbereitungsgrad beträgt £GFX_supply_texticon [?KHI_prep|H0]§Y%§!\n\nWenn unsere Vorbereitung bei Ausbruch des Krieges unter §Y50%§! liegt, wird die Qualität unserer Soldaten unter unserer Nachlässigkeit leiden.\n"
