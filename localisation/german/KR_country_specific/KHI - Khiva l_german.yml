### Bookmark ###
KHI_KR_gathering_storm_desc: "Seit dem Ende des Bürgerkriegs hat Junaid Khan jede Gelegenheit genutzt, um sein Herrschaftsgebiet unabhängiger von Moskau zu machen.\n\nIm Jahr 1929 war es dann soweit – das Chaos nach dem Putsch von Boldyrev und dessen Auswirkungen in Zentralasien ermöglichten es ihm, die faktische Kontrolle über Südtranskaspien zu erlangen.\n\nEr hat lange auf einen weiteren Moment gewartet, um gegen seine Nachbarn vorzugehen, seinen Einfluss und seinen Reichtum zu vergrößern – und angesichts der eskalierenden Spannungen in der Region könnte dieser Moment nun gekommen sein."

### Intro Screen ###
KHI_country_intro_background: "GFX_KHI_intro"
KHI_country_intro_header: "Die Kommunisten gegen den Khan"
KHI_country_intro_header_1: "Sich aus Moskaus Einflussbereich befreien"
KHI_country_intro_header_2: "Auf den richtigen Moment warten"
KHI_country_intro_content: "Als der Taschkenter Sowjet ausgerufen wurde, griffen die Auswirkungen des russischen Bürgerkriegs auf das Khanat Chiwa über. Der edle Befehlshaber von Khan Asfandiyar Khan, Muhammed-Kurban, stürzte die Regierung und ließ den regierenden Khan hinrichten. Er nahm den Titel Junaid Khan an und setzte den Bruder des verstorbenen Khans als fügsamen Marionettenherrscher ein, während er die Stadt hinter den Kulissen kontrollierte. Nun als Befehlshaber des Khanats von Chiwa führte er eine Armee gegen benachbarte bolschewistische Dörfer, sicherte die Grenzen des alten Protektorats Chiwa und verpflichtete sich dann mit seinen Basmachi-Soldaten, den raschen Vormarsch der Weißen Turkestan-Armee nach Süden in Richtung Aschgabat zu unterstützen.\n\nBald darauf war der Bürgerkrieg beendet, und mit der Bekräftigung der früheren Verträge mit Moskau blieb das Khanat Chiwa ein russisches Protektorat. Doch obwohl seine Kontrolle über Chiwa absolut war, litt Junaid Khan unter der Knute des Kommandanten in Taschkent. Dennoch gelang es ihm, die Lage Chiwas zu nutzen, um ein gewisses Maß an Unabhängigkeit zu bewahren."
KHI_country_intro_content_1: "Junaid Khan lief auf und ab wie ein in die Enge getriebener Fuchs, unzufrieden mit Chivas schwacher Position in der sich langsam herausbildenden Ordnung des postrevolutionären Zentralasiens. Junaid, der am besten dafür geeignet war, auf dem Schlachtfeld kühne und kalkulierte Risiken einzugehen, hatte keinen Sinn für Steuerangelegenheiten und Handelsstreitigkeiten und überließ einen Großteil der täglichen Verwaltung den Überresten der Verwaltung des verstorbenen Isfandiyar. Doch Junaid sollte sich bald als harter und unberechenbarer Verhandlungspartner auf der nationalen Bühne erweisen, wie russische Agenten bald erfahren sollten. Junaid gelang es, die Verhandlungen zwischen Chiwa und ihrem Oberherrn in die Länge zu ziehen, indem er sich mit Druck, Schmeichelei, Drohungen und Bestechung eine Reihe von Zugeständnissen für das Restkhanat erkämpfte, die es ihm ermöglichten, ein gewisses Maß an wirtschaftlicher Freiheit zu bewahren und gleichzeitig den Fortbestand seiner Armee aus hartgesottenen Reitern zu sichern – alles angeblich notwendig, um die Region gegen bolschewistische Banden zu verteidigen.\n\nJunaid Khan witterte inmitten des Chaos von 1929 eine Chance, versammelte eine Schar von Reitern und ritt gegen die steuerlose und zerfallende transkaspische Verwaltung. Da die Auswirkungen des Neujahrsputsches und der Zusammenbruch der Befehlsstruktur aus Taschkent seine Gegner zutiefst demoralisierten und eine beträchtliche Anzahl von Soldaten nach Norden in Richtung der Kampfhandlungen zogen, gelang es Junaid, seine Gegner durch eine Reihe schneller Siege auszumanövrieren und auf dem Weg nach Süden in Richtung Aschgabat ein Königreich zu errichten. Angesichts einer Armee von Banditenreitern, die über sie herfiel, wandte sich die russische Garnison in Aschgabat an unwahrscheinliche Verbündete und bat die Perser um Intervention, um den Eisenbahnknotenpunkt zu sichern, bis sich die Lage in Transkaspien stabilisiert hatte und die russische Armee in voller Stärke eintraf.\n\nDie Ankunft der Perser beendete alle Hoffnungen der Chiwaner auf eine glorreiche Eroberung von Aschgabat, und stattdessen richtete Junaid seine Aufmerksamkeit nach Norden. Auf dem Weg, weitere Küstenabschnitte des Aralsees zu sichern, geriet er schnell in einen Kampf mit den Milizen der Alash-Autonomie. Zwar gelang es seinen Truppen, der Expedition unversehrt zu entkommen, doch die prekäre Lage holte Junaid ein und zwang ihn, seine Wunden zu lecken und die Kontrolle über Südtranskaspien zu festigen."
KHI_country_intro_content_2: "Die Nachwirkungen der Taschkent-Krise belasteten den Verwaltungsapparat des Khanats von Chiwa bis an seine Grenzen. Während Junaid Khan seine Tapferkeit auf dem Schlachtfeld unter Beweis stellte, erwies sich die Integration der ehemals transkaspischen Gebiete als schlampige und planlose Angelegenheit und deckte sowohl persönliche als auch institutionelle Mängel unter seiner Herrschaft auf. In den folgenden Jahren konzentrierte sich der Edle Befehlshaber darauf, unter den Stammesangehörigen von Chiwa eine eigenständige turkmenische Identität zu schmieden – eine Aufgabe, die durch Fehden zwischen den Stämmen und den Widerstand der usbekischen Kaufleute und Arbeiter, die das Rückgrat der nominellen Hauptstadt des Khanats bildeten, erschwert wurde.\n\nWährend die Wirtschaft und die Regierungsführung des Khanats stagnierten, da die Beute und die Ausbeute der Taschkent-Krise immer geringer wurden, litt die Armee von Chiwa nicht unter diesen Jahren des Friedens. Tatsächlich sind die persönlichen Reiter von Junaid Khan nach erheblichen Investitionen in ihre Ausbildung und Bewaffnung die vielleicht gefährlichste Streitmacht in Zentralasien – eine Ehre, die sie nur allzu gerne auf dem Schlachtfeld unter Beweis stellen. Mit einem solchen Trumpf im Ärmel beäugt Junaid seine Nachbarn gierig, testet ihre Verteidigung mit kleinen Überfällen und wartet auf Anzeichen von Schwäche, die er ausnutzen kann."
KHI_guide: "Die zentralasiatischen Länder werden in zukünftigen Updates §Czusätzliche Wege und Inhalten§! erhalten.\n£white_dot  Derzeit kann Chiwa nur $paternal_autocrat_coloured$ bleiben." # WIP

### Events ###
khiva_events.100.t: "Das Banditenreich lebt weiter"
khiva_events.100.d: "Nach allem, was man hört, war Junaid Khan dazu bestimmt, im großen Geschehen der Geschichte nur eine kaum wahrnehmbare Randnotiz zu bleiben. Als Spross eines unbedeutenden Adelsgeschlechts der Khivaner Yomuten verbrachte Junaid Khan den größten Teil seines Lebens damit, sich um die Belange seines Dorfes zu kümmern – Regenwasser zu sammeln und Bewässerungsgräben instand zu halten, Streitigkeiten zu schlichten und die kleine Schar der seiner Familie verpflichteten Hauskrieger zu drillen. Als jedoch der alte Khivan-Lehnsherr Isfandiyar Khan die von seinen Yomut-Untertanen geforderten Steuern verdreifachte, schloss sich Junaid Khan dem Strafzug gegen den Khan an, stand stolz hinter Shammi-Kel Khan und seinen fünfhundert tapferen Gefährten und machte sich sowohl in den Kämpfen als auch in den darauf folgenden, von Russland vermittelten Verhandlungen einen Namen. Als Isfandiyar Khan erneut versuchte, die Unabhängigkeit seiner turkmenischen Untertanen zu untergraben, tötete Junaid Khan ihn und ergriff die Macht in Chiwa, wobei er seine Herrschaft durch Waffengewalt und die Loyalität seines engsten Kriegerkaders aufrechterhielt.\n\nUnter anderen Umständen wäre dies der Höhepunkt der Macht des ehrgeizigen Khans gewesen, doch der russische Bürgerkrieg und der darauf folgende turbulente Frieden haben Junaid Khan nur noch mehr Gelegenheiten geboten, sein Reich durch glorreiche Eroberungen zu erweitern und es mit brutaler Gerissenheit zu säubern. Heute steht Junaid Khan an der Spitze eines grandiosen Kartenhauses – sollte er das Gleichgewicht verlieren, wird das gesamte Bauwerk in sich zusammenfallen. Doch wenn es ihm gelingt, seine Feinde und Verbündeten gleichermaßen auszumanövrieren, könnte er am Ende doch als Sieger hervorgehen. Schließlich ist es ein Wunder, dass das von Turkmenen geführte Khanat von Chiwa noch besteht – was ist da schon ein Wunder mehr?"
khiva_events.100.a: "Entweder wir schaffen alles oder wir verlieren alles!"

khiva_events.101.t: "Unsere Verträge mit Russland"
khiva_events.101.d: "Als die Russen die alten Verträge bekräftigten, die unser Khanat als Protektorat an sie banden, war Chiwa kaum mehr als ein abgelegener Stadtstaat. Im Laufe der zwanziger Jahre glaubten nur wenige, dass sich am Status quo viel ändern würde. Während die alternden Basmachi und Jadiden sich zerstritten, floss die Baumwolle weiterhin aus den Handelszentren und Märkten Taschkents nach Norden. Als der russische Befehlshaber des Militärbezirks Turkestan, Wladimir Dmitrijewitsch Grigorjew, seine Truppen zur Unterstützung eines regierungsfeindlichen Putsches einmarschieren ließ, war die Zeit reif für Veränderungen!\n\nJunaid Khan drang tief in Transkaspien vor und war schockiert, dass er kaum Widerstand von den russischen Garnisonen erfuhr. Gefangen in der Verwirrung des Putsches und mit widersprüchlichen Befehlen aus Taschkent und Moskau wurden die meisten demobilisiert oder hatten sich in die Städte zurückgezogen, um die instabile Lage abzuwarten. Da die Tore nach Transkaspien offen standen, fegte Junaid Khan durch die Region und eroberte eine Reihe von Dörfern und Depots. Als die Russen versuchten, ihm entgegenzutreten, so geschwächt sie auch waren, besiegte er sie in einer Reihe kühner Angriffe. Erst als die Truppen der Alash-Autonomie ihm entgegenmarschierten, traf Junaid Khan auf einen Gegner, den er nicht ausmanövrieren konnte. Da die Lage der Russen in ganz Zentralasien zusammenbrach, gelang es Junaid, eine Reihe von Verträgen mit Moskaus Vertretern auszuhandeln, die den Protektoratsstatus von Chiwa bekräftigten und gleichzeitig Junaid Khans faktische Herrschaft über Transkaspien respektierten. Natürlich interessierte sich die russische Seite kaum für das turkmenische Hinterland, solange die Eisenbahnlinien nach Aschgabat sicher und geschützt waren."
khiva_events.101.a: "Die Züge wirken immer etwas leichter, wenn sie die Küste erreichen..."

khiva_events.102.t: "Der herannahende Sturm"
khiva_events.102.d: "Im Vergleich zu den stürmischen Tagen des Neujahrsputsches war das letzte halbe Jahrzehnt eine Zeit des Friedens und der Stagnation, in der alle Seiten ihre Wunden lecken und auf Erholung hoffen. Zentralasien gleicht heute einem Topf, der kurz vor dem Überkochen steht, wobei Intellektuelle, Banditen, Revolutionäre und Despoten gleichermaßen darauf aus sind, den Status quo zu untergraben. Jenseits der Grenzen entwirft der russische Generalstab Pläne und berechnet die Logistik, freudig darauf wartend, den Moment zu erleben, in dem die Demütigungen der Taschkent-Krise gerächt werden können, und Generäle scharren mit den Hufen und warten auf die Erlaubnis ihrer Vorgesetzten, die Autonomiegebiete und Protektorate ein für alle Mal zu zerschlagen. Es ist nur eine Frage der Zeit, bis in Zentralasien erneut ein offener Konflikt ausbricht, und doch sind die Armeen und Milizen der Staaten in der Region durchweg undiszipliniert, unterfinanziert und kaum funktionsfähig. Es wird einiges an Arbeit erfordern, aus bäuerlichem Gesindel und hochgestiegenen Banditen echte Armeen zu schmieden, und man kann nur vermuten, wie die einzelnen Staaten ihre Armeen reformieren wollen.\n\nEines ist jedoch sicher – §Rder Frieden von 1929 wird nicht von Dauer sein.§!"
khiva_events.102.a: "Junaid Khan wird uns zum Sieg führen!"

khiva_events.103.t: "Ein Gesandter aus Turkestan"
khiva_events.103.d: "Offiziell ist das Khanat Chiwa ein Staat, der den Launen und dem Willen Moskaus treu ergeben ist, ungeachtet seines rechtlichen Status als unabhängige Nation. In den Jahren nach den Schwächeanzeichen Russlands im Mandschurienkonflikt und in der Taschkent-Krise haben wir jedoch begonnen, uns auf eine offen feindseligere Haltung gegenüber unseren Herren in Moskau einzustellen. Unser oberstes Ziel ist es, unsere politische Unabhängigkeit von den Launen Moskaus zu bewahren, ohne befürchten zu müssen, dass Kosaken erneut durch die Straßen von Chiwa marschieren. Natürlich bleiben unsere Bemühungen vollkommen geheim, insbesondere solange der russische Ständige Militärberater, Generalmajor Ivan Zaytsev, in Chiwa weilt. Glücklicherweise haben Jahre der Zusammenarbeit eine enge Beziehung zwischen Zaytsev und Junaid Khan geschmiedet, und der russische General ist bereit, bei Schmuggel und Korruption ein Auge zuzudrücken, da er dies weitgehend als das Schmiermittel abtut, das notwendig ist, um die Räder unserer informellen Verwaltung am Laufen zu halten.\n\nEs sind genau diese Schmugglernetzwerke, die den neu ernannten turkestanischen Diplomaten Alihan Tura nach Chiwa gelockt haben. Offiziell ist er durch die Kyzylkum gereist, um über die Freigabe einer auf dem Weg zu den Märkten von Taschkent abgefangenen Baumwolllieferung zu verhandeln, doch der wahre Zweck seiner Reise in unsere Hauptstadt ist weitaus ruchloser. In den letzten Jahren haben wir heimlich beträchtliche Mengen an überschüssigen Waffen aus dem Weltkrieg an die Republik Turkestan verkauft, die in versteckten Laderäumen von befreundeten Nationen über das Kaspische Meer in unsere Häfen gebracht wurden. Während dieses jüngsten Treffens handelte unser Kommandant Aziz Khan eine weitere Waffenlieferung nach Taschkent aus, darunter eine Handvoll österreichischer Minenwerfer M 14, im Austausch gegen turkestanisches Gold und Baumwolle, zwei wertvolle Rohstoffe auf dem internationalen Markt."
khiva_events.103.a: "Es war mir eine Freude, mit ihnen Geschäfte zu machen!"

khiva_events.104.t: "Der Schwarze Montag ist da"
khiva_events.104.d: "Chiwa war nie ein Industriezentrum oder Produzent von wirklich wertvollen Gütern, doch es lag seit jeher an der Schnittstelle zwischen Ost und West und fungierte als Korridor für den Landhandel. Chiwa profitierte am meisten, als die Spannungen zwischen Turkestan und Russland zunahmen, denn immer mehr Züge, die Baumwolle und Gold aus Buchara transportierten, rumpelten durch die Städte Chiwas, um den Zöllen in Taschkent auszuweichen. Natürlich muss jeder, der die Früchte des globalen Handels erntet, auch dessen Nachteile ertragen, und der jüngste Marktcrash in Berlin war eine eindrucksvolle Lektion in dieser Hinsicht. Weniger Züge bedeuten weniger Steuereinnahmen und weniger Beute, und, schlimmer noch, mehr Augen auf jene Züge, die noch durchfahren und Schmuggelware aus fremden Ländern und von offiziell feindlichen Regierungen beherbergen. Dieser schreckliche Schock für die Weltwirtschaft könnte jedoch einige unbeabsichtigte Vorteile für unsere Regierung haben – da sich russische Wirtschaftsinteressen aus ausländischen Verstrickungen zurückziehen, schwächt sich Moskaus Kontrolle über unsere Länder etwas ab."
khiva_events.104.a: "Wie dem auch sei, unser Wiederaufschwung wird schwierig sein"

khiva_events.105.t: "Abschluss der Chardzhui-Übungen"
khiva_events.105.d: "Auch wenn Junaid Khan das sicherlich gerne anders sehen würde, steht das Khanat Chiwa unter starkem Einfluss Moskaus, vor allem durch die Position des ständigen russischen Beraters beim chiwischen Militär. Während das Verhältnis zwischen dem Militärberater und Serdar Karim in den 1920er Jahren angespannt war – wobei sich Letzterer an den zunehmend autoritären Anweisungen seines russischen Gegenübers störte –, änderte sich diese Dynamik mit der Rückkehr von Ivan Matveyevich Zaytsev im Zuge der Taschkent-Krise dramatisch. Generalmajor Zaytsev ist in Chiwa und Turkestan kein Unbekannter, da er während des russischen Bürgerkriegs an der Seite von Junaid Khan gedient hatte. Während des Konflikts schmiedeten die beiden militärisch denkenden Männer eine herzliche Kameradschaft, die für ihren letztendlichen Sieg über die Sowjets von entscheidender Bedeutung war. General Zaytsev kehrte in den Jahren nach dem Ende des Bürgerkriegs nach Norden nach Orenburg zurück, um dort zu lehren, doch das Versagen von General Luka Kondratovich, Junaid Khans Eingreifen in die Taschkent-Krise zu verhindern, führte zu dessen Entlassung und zur Rückkehr von Zaytsev als Moskaus Mann vor Ort in Chiwa.\n\nZum Glück für Junaid Khan hat sich General Zaytsev als zurückhaltender Aufseher und unglaublich engagierter Ausbilder erwiesen, der den Großteil seiner Zeit der Ausbildung und dem Aufbau der Armee des Khanats zu einer modernen Streitmacht widmet. Die von ihm gegründete Kadettenschule hat bereits mit der Ausbildung neuer Offiziere begonnen, und die Auswirkungen seines Fleißes zeigen sich in der Schaffung einiger formellerer Kavallerieeinheiten, die weit entfernt sind von den zusammengewürfelten Banditenbanden, die das Rückgrat des Militärs von Chiwa bilden. Leider wird die triumphale Rückkehr des Generals von Chiwas ersten formellen Militärübungen, die in der Grenzstadt Chardzhui stattfanden, wahrscheinlich seine letzte sein. Jüngste gesundheitliche Probleme haben den Gerüchten um Zaytsev Glaubwürdigkeit verliehen, wonach der alternde General wahrscheinlich noch vor Jahresende von seinem Posten zurücktreten wird. Diese Nachricht ist bedauerlich, da sich Ivan Zaytsev als Segen für das Khanat und die Herrschaft von Junaid Khan erwiesen hat. Es besteht kaum ein Zweifel daran, dass sein Nachfolger nicht in der Lage sein wird, in seine Fußstapfen zu treten."
khiva_events.105.a: "Organisiert eine Parade zu seinen Ehren!"

khiva_events.106.t: "Zaytsev tritt zurück"
khiva_events.106.d: "Knappe Worte erfüllen den stillen Vorraum des Khan-Palasts und hallen in die königlichen Säle wider. Auf der einen Seite steht General Iwan Zajtsev, ständiger russischer Berater des Militärs von Chiwa, ernst und mit verschlossenen Lippen da und erklärt seine bevorstehende Abreise aus der Stadt. Auf der anderen Seite verlangt Junaid Khan Antworten von seinem langjährigen Verbündeten und wird angesichts Zaytsevs Widerspenstigkeit immer wütender. Seit Jahren fungiert Zaytsev als unverzichtbarer Vermittler in der Verwaltung von Chiwa, überbrückt die Kluft zwischen den Sandsteintürmen von Chiwa und den prächtigen Kuppeln Moskaus und glättet die zunehmend turbulenten Beziehungen zwischen den beiden Nationen. Für Junaid Khan ist Zaytsev Chiwas Fenster zur russischen Denkweise, ein Mann, der die inneren Abläufe der russischen militärischen und politischen Elite versteht und dessen Wissen es Junaid Khan ermöglicht hat, die schwierigen Verhandlungen des letzten Jahrzehnts mit Zuversicht zu meistern. Für Russland ist Zaytsev ihr Mann im Lager von Chiwa, ein Agent, der tief in Junaid Khans engstem Kreis eingeschleust ist und ihn immer näher an die Integration heranführt und von der Torheit des Widerstands abhält. Zaytsev seinerseits hat seine Aufgaben meisterhaft unter einen Hut gebracht und dabei widersprüchliche und oft gegensätzliche Anweisungen in Einklang gebracht.\n\nBis jetzt jedenfalls.\n\nZaytsev hat seinen Rücktritt eingereicht und seinen bevorstehenden Ruhestand angekündigt, mit der Begründung, er wolle in seinem fortgeschrittenen Alter in seine Heimat zurückkehren. Zwischen den Zeilen dieser banalen Erklärung verbergen sich jedoch finsterere Andeutungen. Seit Monaten äußert Zaytsev privat seine Besorgnis, dass Boris Savinkovs Regierung ihn eher als Hindernis denn als Gewinn betrachtet. Für die liberale Regierung des vergangenen Jahrzehnts war Zaytsevs persönliche Freundschaft mit Junaid Khan der Schlüssel zu ihrer fortgesetzten, behutsamen Kontrolle über das Khanat. Für Savinkov hingegen ist Zaytsev bestenfalls ein unzuverlässiger Bürokrat und schlimmstenfalls ein Agent aus Chiwa, der Junaid Khan mit den Informationen versorgt, die dieser benötigt, um einer möglichen russischen Militärintervention Widerstand zu leisten. Zaytsev hat nicht ausdrücklich erklärt, dass er zum Rücktritt gezwungen wurde, doch da Savinkov dabei ist, gegen alle Elemente des Militärs vorzugehen, die sich nicht seinem nationalpopulistischen Kreuzzug verschrieben haben, besteht kaum ein Zweifel daran, dass dieser Sturz in Moskau inszeniert wurde. Junaid Khan hat Zaytsev gewarnt, dass er keinen Mann akzeptieren werde, den Russland als seinen Nachfolger entsendet, obwohl beide Männer erkennen, dass eine solche Provokation wahrscheinlich genau das ist, was Savinkov beabsichtigt. Ohne Zaytsevs Einfluss sind die informellen Vereinbarungen, die Chiwa an Russland binden, so gut wie hinfällig, was ein neues Kapitel in den Beziehungen der beiden Nationen einleitet."
khiva_events.106.a: "Aber wer wird ihn ersetzen?"

khiva_events.107.t: "Moskaus Arroganz"
khiva_events.107.d: "Der Abzug von Generalmajor Iwan Sajtsev vom Hof in Chiwa hat eine Welle von Aktivitäten ausgelöst, da ein Jahrzehnt politischer und praktischer Aufbauarbeit nun neu geordnet, aufgegeben und wiederbelebt wird. Moskau hat einen neuen Berater, General Wassili Morosow, an den Hof von Junaid Khan entsandt, doch dieser erwies sich schnell als eitel, dreist und arrogant. Nach einer besonders dreisten Audienz bei Serdar Karim wurde diesem russischen Handlanger jegliche tatsächliche Macht entzogen, er wurde auf seine Gemächer beschränkt und von allen Staatssitzungen ausgeschlossen. Die Maßnahmen in Moskau lassen neue Bestrebungen in Russland erkennen, uns unserer Unabhängigkeit zu berauben, und obwohl die Ausgrenzung russischer Agenten sicherlich bei Savinkov und seinen Kumpanen für Unmut sorgen wird, wären wir Narren, wenn wir sie in einer Position belassen würden, in der sie gegen uns handeln können. In diesem Zusammenhang hat Junaid Khan ein persönliches Interesse an der Entwicklung der Militärschule von Chiwa gezeigt, um die ideologische Loyalität der künftigen Absolventen sicherzustellen, die das Rückgrat seiner Armee bilden werden.\n\nEs ist an der Zeit, die geheimen Abkommen von Chiwa über gegenseitige Verteidigung und militärische Zusammenarbeit mit dem turkestanischen Kriegsherrn Madamin Bek wiederzubeleben. Sein Minister Alihan Tura hat bereits Kontakt zu unserer Regierung aufgenommen, in der Hoffnung, das Einvernehmen wiederzubeleben, das wir mit Madamin Bek und seiner Regierung in den Jahren vor der Taschkent-Krise hatten – ein geheimer Pakt, der ihm zu Ansehen in Turkestan verhalf und der dazu führte, dass wir einen Großteil von Transkaspien unter unsere Kontrolle brachten. Wir werden Aziz Khan nach Taschkent entsenden, um eine neue Vereinbarung mit Turkestan zu schmieden, die uns vor dem Zorn Russlands bewahren könnte."
khiva_events.107.a: "Ein neues Kapitel für Chiwa!"

khiva_events.108.t: "Der Wirbel um Chiwa"
khiva_events.108.d: "Der Herrscher unseres De-facto-Protektorats in Chiwa, der rückständige turkmenische Kriegsherr Junaid Khan, lehnt unsere großzügige Führung seines Rumpfstaates seit langem ab und griff stattdessen auf dem Höhepunkt der Taschkent-Krise tapfere russische Söhne in Aschgabat und Krasnowodsk an. Man muss kein Genie sein, um zu erkennen, dass Chiwa uns niemals wirklich als treuer Untergebener dienen wird; er ist ein Hund, der seinen Herrn einmal gebissen hat – die einzig vernünftige Vorgehensweise ist, ihn einzuschläfern. Stattdessen belohnten die schwachen Regierungen von Rudnew und Maklakow diesen tollwütigen Hund mit der Anerkennung seiner illegalen Kontrolle über Transkaspien und dem Verzicht auf jegliche echte russische Herrschaft über die Chiwaner. Diese peinliche Vorgehensweise wurde von unserem führenden Agenten in Chiwa, dem Kornilow-Anhänger General Iwan Sajzew, angeführt, der "heimisch geworden" ist und sich auf Kosten seines Heimatlandes mit Junaid Khan verbündet hat. Um diese Fehler zu korrigieren, haben wir Sajzew mit zweifelhaften Korruptionsvorwürfen erpresst und ihn so zum Rücktritt gezwungen. Er wurde durch einen vertrauenswürdigeren Hofberater, General Wassili Iwanowitsch Morosow, ersetzt. Als Reaktion darauf hat Junaid Khan General Morozov unter eine Art Hausarrest gestellt und ihm untersagt, die Altstadt von Chiwa zu verlassen oder mit der von Russland geförderten Militärschule von Chiwa in Kontakt zu treten!\n\nJunaid Khans dreiste Handlungen drohen, unsere informelle Kontrolle über die Region zu untergraben, und unsere verbliebenen Agenten in Chiwa berichten, dass er beabsichtigt, die Beziehungen zur abtrünnigen Turkestanischen Republik zu stärken. Ohne die uneingeschränkte Unterstützung und Kontrolle des Militärs wäre eine Intervention in Chiwa aufgrund von Junaid Khans Provokationen gefährlich und schwierig. Stattdessen haben unsere Agenten innerhalb des Khanats vorgeschlagen, dass wir den inhaftierten Chiwa-Khan heimlich unterstützen, der, sollte er durch einen Staatsstreich wieder an die Macht gelangen, sich sicherlich als gefügigere Marionette erweisen würde. In der Zwischenzeit müssen wir unseren Stolz herunterschlucken und den tollwütigen Hund in Chiwa ignorieren, damit wir ihm nicht durch ein Vorgehen gegen ihn noch mehr Unterstützung in der Bevölkerung verschaffen."
khiva_events.108.a: "Bereitet einen Putsch vor, je früher, desto besser..."
khiva_events.108.b: "Vergesst einen Putsch und ignoriert diese Narren!"

khiva_events.109.t: "Halbe Treue, doppelte Spionage"
khiva_events.109.d: "Spionage ist vielleicht die härteste Prüfung, die es für die Loyalität gegenüber dem eigenen Anführer gibt. Spione sind ständig von Angst und Versuchungen umgeben, und wir sind mehr als bereit, ausländischen Agenten sowohl die Angst vor Entdeckung und Tod zu verstärken als auch die Belohnungen für Untreue zu erhöhen.\n\nVor kurzem gelangten Nachrichten in unseren Besitz, die von einem Spion stammten, den der perfide Emir von Buchara in unsere Stadt entsandt hatte. Dieser bucharische Überläufer hat angeboten, seine Dienste vom Hof von Buchara auf unseren zu verlagern, indem er Informationen, die er als Mitglied des bucharischen Spionagenetzwerks gesammelt hat, im Austausch gegen große Geldsummen an uns weitergibt. Es scheint jedoch, als sei das Glück nicht auf der Seite dieses Verräters gewesen, da die anonyme Kontaktmethode, die er nutzte, um uns zu erreichen, weniger anonym ist als erwartet. So konnten wir den Möchtegern-Doppelagenten bis zu seiner Unterkunft verfolgen, wo sich herausstellte, dass er ein recht bekannter Teppichhändler ist. Zwar würde die bloße Beseitigung dieses Spions aus Buchara unsere Stadt ein Stück sicherer machen, doch haben wir die Möglichkeit, ihm eine möglicherweise beträchtliche Menge an Informationen über unsere Feinde zu entlocken, wenn wir ihn am Leben lassen. Wie sollen wir vorgehen?"
khiva_events.109.a: "Nutzt dieses Wissen, um einen günstigeren Preis für seine Dienstleistungen auszuhandeln."
khiva_events.109.b: "Sorge dafür, dass diesem unzuverlässigen Kerl ein "Unfall" zustößt."

khiva_events.110.t: "Vergeben oder häuten"
khiva_events.110.d: "Wir sind uns der Korruption, die unser Emirat plagt, nur allzu bewusst, doch hatten wir gehofft, dass sie nicht über Geldzahlungen hinausginge, die dazu dienen, die Räder der Bürokratie zu schmieren. Leider scheint es, als wären wir zu optimistisch gewesen. Einer unserer produktivsten Informanten in der Stadt Chiwa, ein usbekischer Teppichhändler mit Verbindungen zur Bürokratie des Khanats, ist kürzlich unter Verdacht geraten. Vertraute unseres Mannes in Chiwa haben kürzlich nachgewiesen, dass er vor Kurzem eine Geldsumme erhalten hat, die in keinem Zusammenhang mit seinen geschäftlichen Aktivitäten steht, was uns zu der Annahme veranlasst, dass diese nur von Junaid Khan und seinen Kumpanen stammen kann – entweder als Bestechungsgeld oder, was noch heimtückischer wäre, als Beweis dafür, dass dieser Agent im Spionagespiel auf zwei Hochzeiten tanzt. Zudem kursieren am Hof von Chiwa Gerüchte, dass der lange Zeit dahinsiechende Geheimdienst von Chiwa kürzlich wieder zum Leben erwacht sei, was die Schuld unseres Informanten weiter untermauert. Wir müssen einfach akzeptieren, dass einer unserer Besten wahrscheinlich nicht so loyal ist, wie wir gehofft hatten.\n\nWährend viele bereit sind, unseren Agenten zu eliminieren und von vorne anzufangen, sagen einige, dass diese Operation vielleicht noch zu retten ist. Wenn er mit Beweisen für seinen Verrat konfrontiert wird, könnte er bereit sein, zu seiner ursprünglichen Loyalität zurückzukehren – mit dem zusätzlichen Vorteil, das Vertrauen von Junaid Khan und den Khivanern zu genießen. Ist das Risiko es wert?"
khiva_events.110.a: "Als Doppelagent ist er sogar noch wertvoller!"
khiva_events.110.b: "Ruf ihn ein letztes Mal an, wenn er auf Geschäftsreise in Buchara ist..."

khiva_events.111.t: "Wer mich einmal täuscht, dem sei vergeben. Wer mich zweimal täuscht..."
khiva_events.111.d: "Das Schwierige daran, sich auf Menschen mit zweifelhaftem Charakter zu verlassen, ist, dass sie sich selten endgültig bekehren lassen.\n\nDer Teppichhändler, der zum Spion aus Buchara und schließlich zum Doppelagenten wurde und auf unserer Gehaltsliste steht, scheint von denen entdeckt worden zu sein, die er verraten hat. Die Männer, die wir zur Überwachung unseres neu gewonnenen Geheimdienstinformanten eingesetzt hatten, berichten, dass er in seinem eigenen Haus von seinen bukharischen Kontaktleuten überrascht wurde, und es scheint, als habe er angeboten, seine Loyalität wieder dem Emir von Buchara zu verschreiben.\n\nDass dieses Angebot gemacht wurde, steht außer Zweifel. Dass er lebend davongekommen ist, bedeutet, dass er zumindest so getan haben muss, als würde er es annehmen. Trotzdem arbeitet er möglicherweise immer noch für uns und gibt dem Feind nur symbolische Informationen weiter. Können wir es uns leisten, dieses Risiko einzugehen?"
khiva_events.111.a: "Er ist wirklich ein gewiefter Gewinn!"
khiva_events.111.b: "Das wird langsam lächerlich, hängt ihn auf!"

khiva_events.700.t: "Wir haben gesiegt!"
khiva_events.700.d: "Nach einem Jahr voller Gewalt und Tod in einem Ausmaß, wie es unser Volk noch nie erlebt hat, ist eine feierliche Stille über Zentralasien hereingebrochen. Unsere Kühnheit hat sich endlich ausgezahlt – Alim Khan, Madamin Bek, der russische Bär, sie alle sind vor unserer Armee gefallen, Opfer ihrer Hybris und Trägheit. Es war kein leichter Weg. Jedes Schlachtfeld ist die letzte Ruhestätte Hunderter tapferer Jungs aus den Stämmen der Teke, Ersari, Chowdur, Gokleng, Sarlyk und natürlich der Yomut. Auch wenn ihre Opfer sicherlich gewürdigt werden, ist jetzt nicht die Zeit für Gedenken oder Feiern. Junaid Khan steht nun unangefochten vor den Toren der größten Städte Zentralasiens, deren Milizen zerstreut sind, deren Herrscher tot sind oder sich verstecken und deren riesige Reichtümer in greifbarer Nähe liegen. Die Entscheidung liegt bei ihm – diese Städte zu überfallen und ihre Beute für sein Heer zu beanspruchen oder sie in Frieden zu lassen, damit er sich mit ihnen treffen und eine Art Abkommen schließen kann. Denn warum sollte man das Schaf für sein Fleisch schlachten, wenn man es für seine Wolle behalten kann?"
khiva_events.700.a: "Und was für ein paar fette Schafe diese Städte doch sind!"

khiva_events.701.t: "Die Städte schwören uns Treue"
khiva_events.701.d: "Junaid Khan ist kein Mann der Städte – er ist in den ländlichen turkmenischen Gemeinden aufgewachsen, die Choresm prägen, und hat lange sein Bestes getan, um so viel Zeit wie möglich außerhalb von Chiwa zu verbringen – eine Aufgabe, die mit der Zeit leichter wurde, da die Grenzen seines Reiches gewachsen sind. Nach seiner Rückkehr von seinen Triumphen im Osten hat es sich Junaid Khan jedoch zur Aufgabe gemacht, mit seinen treuesten und erfahrensten Kadern durch jede der großen Städte Zentralasiens zu ziehen. Diese Besuche dienen jedoch nicht nur dazu, das Ego des alten Khans zu streicheln, sondern sind vielmehr kalkulierte Manöver, die darauf abzielen, ein neues Verständnis zwischen der Metropolenkonstellation und dem zerlumpten Stammesführer zu schaffen, dem sie nun angeblich dienen.\n\nIn jeder Stadt hat Junaid Khan angespannte Treffen mit Stadträten, Handelsgremien und religiösen Führern abgehalten – um die Einzelheiten der turkmenischen Herrschaft zu verhandeln. Er beabsichtigt, mit sanfter Hand zu regieren und im Gegenzug für Treueeide und Berge von Gold weitreichende Autonomie und lokale Rechte zu gewähren. Größtenteils ist es ihm recht gut gelungen, seine Gesprächspartner von der Weisheit der Akzeptanz zu überzeugen, wobei er eine Mischung aus Charisma, List und offenen Gewaltandrohungen einsetzte, um sie alle auf Linie zu bringen. Für die Menschen in Buchara, Samarkand, Taschkent, Kokand, Andischan … geht das Leben einfach ganz normal weiter. In einigen Fällen hat sich das Leben sogar verbessert, da lokale Machthaber durch ihre gefügigeren Freunde ersetzt wurden, während in anderen Fällen die Stadtbewohner über neue Steuern murren, die dazu bestimmt sind, die Plage von Chiwa zu besänftigen. Währenddessen machen sich die ersten mit Tribut beladenen Züge auf den Weg nach Westen, mit Ziel die Gewölbe und Vorratskammern des Großen Palastes."
khiva_events.701.a: "Mit der Zeit werden sie unseren Schutz zu schätzen wissen."

khiva_events.702.t: "Kriegsherren und Stammesführer schwören uns Treue"
khiva_events.702.d: "In dem Strudel der Gewalt, der Zentralasien seit langem erfasst hat, hat jeder Anführer oder Kriegsherr, der etwas auf sich hält, gelernt, dass Loyalität zwar eine Tugend sein mag, zu viel Loyalität jedoch leicht den Tod bedeuten kann. Jahrelanges Hin- und Herwechseln von einem Kurbashi zum anderen (und vom Kommissar zum Emir zum Präsidenten) hat sie die Kunst der flexiblen Loyalität gelehrt. Junaid Khan, der langjährige Anführer der für ihre Rebellion bekannten turkmenischen Stämme, ist ebenfalls ein Experte in flexibler Loyalität: Er spielt seine widerspenstigen Untergebenen gegeneinander aus, macht den richtigen Männern die richtigen Versprechungen und zeigt Charakterstärke, wenn er herausgefordert wird.\n\nNachdem er ganz Zentralasien erobert hat, findet er sich plötzlich an der Spitze einer großen und instabilen Pyramide aus Stammeshäuptlingen, Militärführern und aufstrebenden Banditen wieder. Als Gegenleistung für Treueversprechen und die Bereitstellung von Männern und Waffen für Junaid Khans Privatarmee wurde dieser bunten Schar von Männern Schutz und Sicherheit angeboten. Tatsächlich hat Junaid Khan ihnen genau das geboten, wonach die meisten suchten – ein Auge zuzudrücken bei ihren eigenen kleinen privaten Lehensgütern, im Austausch für kaum mehr als uralte feudale Verpflichtungen. Die meisten Männer ergriffen die Gelegenheit, sich in den Dienst von Junaid Khan zu stellen, sodass nur die dickköpfigsten und stursten Häuptlinge übrig blieben, die unter Bajonettdrohung durch solche ersetzt wurden, die zur Vernunft kommen wollten."
khiva_events.702.a: "Gebt ihnen Freiheit, und sie werden uns ihre Waffen geben."

khiva_events.703.t: "Junaid Khan kehrt aus dem Osten zurück"
khiva_events.703.d: "Während er durch die Felder des Aralbeckens reitet, kann Junaid Khan, der an der Spitze eines großen turkmenischen Heeres steht, ein Lächeln nicht unterdrücken. Er hatte es endlich geschafft – seine Heimat würde zum ersten Mal in seinem Leben vor den Klauen fremder Hunde sicher sein. Es war keineswegs eine leichte Aufgabe. Zunächst musste er den usbekischen Geiern in Chiwa selbst die Krallen stutzen, die sich lange Zeit an der Arbeit ihrer turkmenischen Untertanen bereichert hatten. Als Nächstes saugte er das sozialistische Gift aus den tiefen Wunden, die der Bürgerkrieg geschlagen hatte, und kehrte Jahrhunderte der Unterdrückung um, indem er das moskowitische Joch abwarf. Nun hat er Zentralasien endlich unter der weisen und starken Führung seines Volkes vereint. Zum ersten Mal werden die Arme von Samarkand und Kokand sowie die Milizen von Fergana und Aral gemeinsam gegen diejenigen vorgehen, die unser Land und unsere Freiheit begehren, anstatt sich sinnlos gegenseitig zu bekämpfen. Sie werden im Gleichschritt kämpfen, verbunden durch die tapferen Herzen ihrer turkmenischen Brüder, die sie in eine glorreiche neue Zukunft geführt haben. Endlich kann das einst gespaltene und unterdrückte turkmenische Volk in Frieden leben. Junaid Khan war einst der ungebildete Wasserverteiler des Yomut-Stammes, doch heute ist er der Vater aller Turkmenen und darüber hinaus der edle Befehlshaber des gesamten Turkmenlands! Sein Triumph ist ein Triumph für alle Turkmenen! Er wird im gesamten Aral-Tal und an beiden Ufern des Amu Darya gefeiert werden! Sein Triumph ist ein Triumph für alle Turkvölker! Er wird auf der ganzen Welt gefürchtet sein, von Samarkand bis St. Petersburg!"
khiva_events.703.a: "Die Hörner ertönen, der Herrscher ist heimgekehrt!"

khiva_events.704.t: "Royalistischer Komplott aufgedeckt"
khiva_events.704.d: "Aziz Khan empfing Junaid Khans Siegeszug am frühen Morgen am Stadtrand von Chiwa und überbrachte ihm die ernste Nachricht, die er und andere erst wenige Stunden zuvor aufgedeckt hatten. Der Neffe und der Sohn des Khans waren in eine gefährliche Verschwörung gegen ihren Serdar Karim verwickelt, potenzielle Anführer eines Staatsstreichs, der ihn auf der Straße entthronen und durch den grüblerischen Qungrat-Monarchen ersetzen sollte, der nun im Palast eingesperrt war. Sie hatten Mitverschwörer in Schlüsselpositionen in der Nähe von Junaid Khan eingeschleust und den Grundstein für eine Regierung nach dem Abgang des alten Generals gelegt. Natürlich wurde mit diesen Möchtegern-Attentätern bereits kurzen Prozess gemacht, einer durch die Hand von Aziz Khan selbst.\n\nEhrlich gesagt überrascht es niemanden, dass sich die Royalisten endgültig als Schlangen erwiesen haben – sie haben schon lange gegen die Interessen des Reiches und ihrer Untertanen gearbeitet und stehen wahrscheinlich unter dem Einfluss ausländischer Mächte und der Exilanten aus Buchara. Die Dreistigkeit dieses Komplotts hat uns jedoch schockiert. Der Qungrat-Clan ist zwar gerissen und bösartig, aber er ist jenseits der Grenze auch als feige bekannt – nicht als die Art von Menschen, die es wagen würden, den Status quo mit vorgehaltener Waffe zu gefährden. Vor diesem Hintergrund gibt es einige, die argumentieren, dass diese Verschwörung über die Männer, die wir kürzlich aufgespürt haben, und ihre monarchistischen Gönner hinausgeht, und Aziz Khan beabsichtigt, ihre Grenzen so schnell wie möglich auszuloten. Vorerst hat Junaid Khan seine Wachen durch handverlesene Veteranen ersetzt, und bekannte Komplizen der Handlanger der Verschwörer wurden inhaftiert. Der Khan und seine Familie wurden jedoch vorerst nicht verhaftet, damit sie nicht versehentlich einige ihrer eigenen Freunde entlarven."
khiva_events.704.a: "Den Rest werden wir aufspüren."

khiva_events.1001.t: "Der eingesperrte Khan rührt sich"
khiva_events.1001.d: "Seit sechzehn Jahren regiert Sayid Abdullah Khan von den Qungrats als nomineller Khan des Khanats von Chiwa. Natürlich ist Sayid Abdullahs Herrschaft kaum mehr als eine Farce, da die gesamte Macht fest in den Händen seines 'Serdar Karim', des turkmenischen Generals Junaid Khan, konzentriert ist. Während der ersten etwa zehn Jahre dieser Regelung blieb der Marionetten-Khan in den Hallen des Palastes von Narallabay gefangen, eingeschüchtert durch die Hinrichtung seines Bruders Isfandiyar und die kalten turkmenischen Wachen, die überall auf dem königlichen Gelände postiert waren.\n\nIn den letzten Jahren scheint sich die Schlinge um Sayid Abdullahs Hals jedoch gelockert zu haben, da Besuche von Freunden und Familie zunehmend gestattet werden. Der Mummer’s Khan hat diese Gelegenheit genutzt, um seine Beziehungen zu seinen familiären Verbündeten unter den verbliebenen usbekischen Adligen wieder aufleben zu lassen, wobei er seinen Neffen Abdurasul als Verbindungsglied zur Außenwelt einsetzt. Junaid Khan wird mit diesen neuen Unabhängigkeitsbekundungen seiner Marionette umgehen müssen, damit dieser nicht aus den Engen des Palastes heraus ein Netzwerk von Anhängern aufbaut. Die einfachste Option wäre, den Khan und seine Familie in Ruhe zu lassen. Auch wenn diese Vorgehensweise in Zukunft Probleme verursachen könnte, würde sie kurzfristig Konflikte vermeiden. Alternativ wäre die Beseitigung von Abdurasul ein direkter Weg, jeden usbekischen Aufstand im Keim zu ersticken, würde aber sicherlich jede Chance zunichte machen, die Kluft zwischen den turkmenischen Häuptlingen und den usbekischen Adligen zu überbrücken. Eine radikalere Vorgehensweise wäre es, Sayid Abdullah einzuladen, eine begrenzte Rolle in der Regierungsführung des Khanats zu übernehmen, indem er bei öffentlichen Veranstaltungen auftritt und an einigen Sitzungen teilnimmt – eine Position, die zwar zur Einigung des Khanats beitragen könnte, es aber umso schwieriger machen würde, die Anhänger des Khans unschädlich zu machen."
khiva_events.1001.a: "Schaltet Abdurasul unauffällig aus."
khiva_events.1001.b: "Behaltet sie im Auge, aber tut nichts."
khiva_events.1001.c: "Lasst den Khan doch ein paar Kleinigkeiten erledigen – was kann das schon schaden?"

khiva_events.1002.t: "Der Umgang mit den Chiefs"
khiva_events.1002.d: "Als Junaid Khan die Macht übernahm, stand er an der Spitze einer riesigen Koalition turkmenischer Stämme, von denen jeder ganz eigene Ziele verfolgte und in denen seit Generationen andauernde Feindseligkeiten herrschten. Nur durch ihren gemeinsamen Hass auf die Jungen Chiwaner und den schwachen Khan von Qungrat gelang es diesen unterschiedlichen Häuptlingen und Anführern, ihre persönlichen Feindschaften beiseite zu legen; und sobald es ihnen gelungen war, den Khan und die Liberalen zu vertreiben, wandten sie sich gegen ihren ehemaligen Anführer. Koshmamed Khan, Shamurad Bakhshi, Gulyam Ali – Junaid Khan besiegte jeden seiner Gegner in der turkmenischen Koalition, zwang sie zur Unterwerfung und schickte sie schließlich ins Exil.\n\nEs ist fast zwei Jahrzehnte her, seit diese Männer aus dem Khanat vertrieben wurden, und seit Jahren fordern ihre Verwandten und Nachkommen lautstark ihre Rückkehr. Junaid Khan hat Koshmamed Khan bereits die Rückkehr gestattet, im Austausch gegen Geiseln und erneute Treueeide, doch die beiden übrigen rebellischen turkmenischen Häuptlinge bleiben im Exil in Persien. Ihre Familien sind einflussreich, selbst angesichts ihrer geschwächten Lage, und die Zeiten, in denen Zweifel an Junaid Khans Herrschaft über Chiwa bestanden, sind längst vorbei. Vielleicht wäre es das Beste, wenn diese erfahrenen Stammesführer zurückkehren würden? Schließlich würde dies zweifellos die Großzügigkeit von Serdar Karim unter Beweis stellen, und der Rat kampferprobter turkmenischer Kriegsherren ist stets dem Rat usbekischer Speichellecker vorzuziehen."
khiva_events.1002.a: "Lasst sie zurückkehren"
khiva_events.1002.b: "Keine Nachsicht für Verräter!"

khiva_events.1003.t: "Ein Geschichtsstudent?"
khiva_events.1003.d: "Zwar gibt es in Chiwa einige Männer, die Junaid Khan mit einer Vielzahl ungerechtfertigter Beleidigungen überhäufen, doch wäre keiner so töricht, den edlen Befehlshaber des Khanats als unerfahren zu bezeichnen. Zunächst bekleidete Muhammet-Gurban die wichtigen Dorffunktionen des Gazi (Richter) und Mirab (Wasserverwalter) des Yomud-Junaid-Clans, bevor er an die Spitze der turkmenischen Stammespolitik aufstieg, als er deren Verteidigung gegen die Strafexpeditionen des alten Qungrat-Khans, des ruchlosen Isfandiyar-Khans, anführte. Als die jungen Chiwaner die Kontrolle über die Hauptstadt ergriffen und drohten, das Khanat unter ihre gottlose Herrschaft zu bringen, war es Junaid Khan, der zur Rettung eilte, die zerstrittenen turkmenischen Clans unter seiner Herrschaft vereinte und die Reformer zerschlug. Als Lenin und seine Bolschewiki in Petrograd den Aufstand ergriffen, versammelte Junaid Khan seine Männer, um gegen die Sowjets zu kämpfen. Als Madamin Bek und seine Kurbashi in Kokand den Aufstand ergriffen, marschierte er auf Aschgabat.\n\nJunaid Khan hat fast sechzig Jahre lang gekämpft, gearbeitet und regiert. Diese Jahrzehnte voller anspruchsvoller Regierungsgeschäfte und zügelloser Gewalt ließen Junaid Khan kaum Zeit, sich den intellektuelleren Beschäftigungen zu widmen, die die Welt zu bieten hat, sodass er nur über vage Lese- und Schreibkenntnisse verfügt und ungehobelt wirkt, obwohl sich hinter seiner rauen Fassade ein gewiefter und gerissener Autokrat verbirgt. Als die turkmenischen Stämme in größter Not waren, war es der weise Sufi-Führer Ishan Khan, der Junaid Khan als den richtigen Mann vorschlug. Heute hat Ishan Khan einen Platz am Königshof gefunden, wo er den edlen Befehlshaber berät und sich an religiösen und politischen Debatten beteiligt. Seit kurzem unterrichtet der Weise Ishan Junaid Khan in der Geschichte von Chiwa, ein Thema, das die Fantasie des herrschenden Generals der alten Stadt sichtlich beflügelt."
khiva_events.1003.a: "Das Leben kann nicht immer nur aus Pferden und Handgranaten bestehen"
khiva_events.1003.b: "Wir haben keine Zeit für diese Kurse!"

khiva_events.1004.t: "Ishan Khans Geschichten: Der Hochmut der Antike"
khiva_events.1004.d: "Junaid Khan verbrachte lange Nächte in den Privatgemächern seines alten Verbündeten, des Sufi-Geistlichen Ishan Khan, und lauschte gebannt den Erzählungen über das alte Chiwa. In seiner ersten richtigen Lektion über die Geschichte der Stadt beschrieb Ishan den Aufstieg und Fall des alten Khwarazmischen Reiches. Vor fast tausend Jahren erhob sich der seldschukisch-mamlukische Feldherr Anushtegin Gharachai, stürzte einen rebellischen Schah in Khwarazm und begründete eine Dynastie, die schließlich ganz Zentralasien beherrschen sollte. Über Generationen hinweg herrschten die Schahs von Khwarazm über die kleineren Stämme und Adelsfamilien der Steppen und schufen das größte Reich der muslimischen Welt.\n\nAls ein aufstrebender Kriegerkönig im Fernen Osten erstmals Kontakt zum aufstrebenden Reich der Choresmier aufnahm, wandte sich Choresmschah Mohammed II. dem Rat seines weitreichenden Diwans zu und schenkte den Einflüsterungen seiner Berater Gehör. Aus Angst, die Bitten des fernen Eroberers seien nur ein Trick, um sein Reich zu schwächen, ließ Mohammed die Gesandten hinrichten und ihre Geschenke beschlagnahmen, womit er den Zorn des großen Khans der Khans auf sich zog. Als sich die mongolischen Horden an den Grenzen des Reiches versammelten, erstarrten die einst blutrünstigen Minister plötzlich vor Angst, und das große Reich wurde in Schutt und Asche gelegt, wobei kaum mehr als die Ruinen von Gurganj übrig blieben. Nachdem er Ishan während der gesamten Geschichte aufmerksam zugehört hatte, scheint Junaid Khan einige Lektionen verinnerlicht zu haben und könnte sogar die Reise nach Gurganj antreten, um die alten Steine von Khwarazm zu betrachten."
khiva_events.1004.a: "Ein Feldherr, der König wird? Interessant..."
khiva_events.1004.b: "Mohammed II. wurde durch die Feigheit seines Diwans vergiftet!"
khiva_events.1004.c: "Wir haben keine Zeit mehr, uns mit Geschichtsunterricht aufzuhalten!"

khiva_events.1005.t: "Ishan Khans Geschichten: Der Aufstieg der Qungrats"
khiva_events.1005.d: "Nach seiner Rückkehr von einem kurzen Besuch der verfallenen Ruinen von Gurganj befand sich Junaid Khan erneut in den Privatgemächern von Ishan Khan und lauschte aufmerksam den Erzählungen aus längst vergangenen Zeiten. Der Weise begann damit, zu erklären, dass die alte Stadt Gurganj schließlich von ihrem letzten Beschützer, dem fruchtbaren Oxus-Delta, verlassen wurde. Dieses verlagerte sich vor fünfhundert Jahren nach Süden und ließ sich am heutigen Standort von Chiwa nieder, das als Schlachtfeld zwischen den Usbeken in Buchara und Samarkand und den schiitischen Schahs von Persien dienen sollte. Zum größten Teil führten die Khans von Chiwa Krieg gegen die ruchlosen Khans von Buchara und kämpften ununterbrochen um die Kontrolle über die wertvollen Oxus-Auen. Die Khans von Chiwa fanden sich zwischen den Aggressionen der Perser und der Bucharaner gefangen und kämpften ständig ums Überleben, als ob der Boden ihres Landes durch das Blut von Millionen von Choresaniern verflucht wäre. Als die Marionette der Bucharaner, der Schibanide Ilbars Khan, in die Fußstapfen von Mohammed II. trat und persische Gesandte hinrichten ließ, ließ der schiitische Eroberer Nadir Schah Ilbars enthaupten und die Schibaniden-Besitztümer auflösen.\nIshan Khan verstummte plötzlich, sein Blick huschte durch den Raum, bevor er auf Junaid Khan ruhte. Mit gedämpfter Stimme fuhr der Geistliche fort und erklärte, dass der mächtige Stamm der Qungrat in dem durch den Rückzug der Perser entstandenen Machtvakuum immer dominanter wurde. Zunächst regierten sie über das Khanat durch Marionetten der Shibaniden, bevor Iltuzar Khan sich einfach selbst zum Khan ernannte und als erster Qungrat-Khan von Chiwa regierte. Während Iltuzar aufgrund seiner Abstammung keinen Anspruch auf den Titel hatte, sicherte sein Bruder Muhammad Rahim den Qungrats das Khanat durch den Kampf.\nVon dieser Geschichte beunruhigt, schritt Junaid Khan zum Fenster seines Beraters und blickte hinaus über die von Fackeln erleuchtete Stadt. Sein Blick fiel auf die Kuhna-Ark, die Zitadelle, deren dicke Steinmauern seine eigene Qungrat-Marionette gefangen hielten."
khiva_events.1005.a: "Die Qungrats haben einfach… die Macht an sich gerissen?"
khiva_events.1005.b: "Wir haben keine Zeit mehr, uns mit Geschichtsunterricht aufzuhalten!"

khiva_events.1006.t: "Ishan Khans Geschichten: Widerstand gegen die Russen"
khiva_events.1006.d: "Junaid Khan verabscheute seine Rolle am Hofe des Tash Chauli, des Palastes der Steine, wo er sich mit Bitten und Beschwerden herumschlagen musste, während er eigentlich draußen im Feld hätte sein sollen, um sein Khanat auf den bevorstehenden Krieg vorzubereiten und zu trainieren. Nach einem besonders anstrengenden Tag machte sich Khivas Serdar Karim auf den Weg zu den Gemächern des weisen Ältesten Ishan Khan, in der Hoffnung, etwas Erholung von den hinterhältigen Intrigen am Königshof zu finden. Wie es der Zufall so wollte, war der Geistliche zu Hause, und Junaid Khan bat seinen alten Freund inständig, seine Erzählungen über die Herrschaft der Khans von einst zu Ende zu bringen.\n\nSie verschwendeten kaum Zeit mit Höflichkeiten, bevor Ishan Khan begann, die Herrschaft des alten Qungrat-Khans, Shir Ghazi Khan, zu schildern, der vor fast drei Jahrhunderten Opfer einer russischen Invasion geworden war. Prinz Aleksandr Bekovich-Cherkassky marschierte vom Kaspischen Meer nach Chiwa, auf der Suche nach den Reichtümern des goldreichen Oxus. Obwohl die hastig zusammengestellte Armee aus Chiwas Wehrpflichtigen schnell besiegt wurde, gelang es Shir Gazi, seinen russischen Gegner davon zu überzeugen, dass er kapitulieren würde, und schlug vor, die russische Expedition solle sich auf das Land verteilen, um die Nahrungsbeschaffung zu erleichtern. Als die Russen ihre Streitkräfte aufgeteilt hatten und sich niedergelassen hatten, um das Umland zu sichern, fielen die Chiwaner, unterstützt von ihren turkmenischen Verbündeten, über sie her und metzelten Fürst Tscherkasski und seine Armee Dorf für Dorf nieder, wobei nur wenige Überlebende übrig blieben, um die Geschichte zu erzählen.\n\nDie vernichtende Niederlage der Armee von Fürst Tscherkasski konnte die Russen jedoch nicht lange abschrecken. Ein Jahrhundert später brach eine Expedition aus Kamelen und Wehrpflichtigen aus dem Norden auf, doch sie kamen nicht weit von ihrem Stützpunkt in Orenburg, bevor sie auf einen besonders strengen Winter stießen. Nachdem ein Fünftel ihrer Männer und fast die Hälfte ihrer Tiere Hunderte von Meilen vor den Toren von Chiwa umgekommen waren, waren die Männer gezwungen, mit eingezogenem Schwanz zu den russischen Festungen zurückzufliehen."
khiva_events.1006.a: "Die List war Khivas Schwert..."
khiva_events.1006.b: "...und das Wetter als ihr Schutzschild"
khiva_events.1006.c: "Wir haben keine Zeit mehr, uns mit Geschichtsunterricht aufzuhalten!"

khiva_events.1007.t: "Ishan Khans Geschichten: Der Untergang von Chiwa"
khiva_events.1007.d: "Während seine Rolle als Serdar-Karim von Chiwa Juniad Khan oft daran hinderte, die gleichnamige Stadt zu verlassen, zog ihn seine Stellung als Oberhaupt des Turkmenenstammes der Yomud häufig auf deren Weidegebiete am Aral im Nordwesten. Als er seinen engen Berater Ishan Khan auf eine solche Reise mitnahm, kam das Gespräch unterwegs schließlich wieder auf die Geschichte dieser Länder. Ishan Khan konnte über die letzte der russischen Invasionen kaum etwas sagen, was Junaid Khan nicht bereits wusste. Schließlich hatten beide Männer diesen Krieg miterlebt und waren Zeugen der grausamen Effizienz des russischen Vormarsches geworden. Als junger Mann diente Junaid Khan an der Seite seines Vaters Khojibay, dem Oberhaupt der Yomud-Turkmenen. Selbst angesichts überwältigender Übermacht führten Khojibay und sein junger Sohn einen Zermürbungskrieg gegen die Artillerie und die Gewehre der Invasoren und kämpften tapfer im Namen eines Qungrat-Khans, der sein Khanat bereits an die Ungläubigen übergeben hatte. Ihre Unverschämtheit sollte ihren Clan jedoch teuer zu stehen kommen, und während Muhammad Rahim Khan II. freudig seine neuen Marionettenfäden anzog und sich in seiner Rolle als Marionette einrichtete, wurden die Yomuds von den vorrückenden Russen systematisch hingerichtet, niedergemäht wie Weizen vor der Sense.\n\nPlötzlich verstummte Ishan Khan, und Junaid Khan bemerkte, dass sich sein Gesicht zu einer Grimasse verzerrt hatte. Während seine Familie für das Khanat gekämpft und geblutet hatte, hatte der Qungrat-Khan ihre Würde weggeworfen, um die erbärmliche Imitation von Herrschaft aufrechtzuerhalten – eine Sünde, die er an dem Tag gesühnt hatte, als er Muhammad Rahims Sohn enthaupten ließ. Er hatte die Revolutionäre zerschlagen und die Ehre von Chiwa wiederhergestellt, doch das Erbe der russischen Herrschaft hing immer noch wie eine Plage über dem Khanat. Die Zeit für Geschichten und Erinnerungen war vorbei, doch vielleicht würden sich diese Lehren im Kampf gegen die Russen als nützlich erweisen."
khiva_events.1007.a: "Um diese Hunde zu besiegen, braucht es List."
khiva_events.1007.b: "Um ehrlich zu sein, habe ich nicht viel gelernt..."

khiva_events.1008.t: "Pferdezüchter von Yomud"
khiva_events.1008.d: "Wer den Großen Basar von Chiwa besucht, kommt selten an den Ständen der Pferdehändler vorbei, ohne die Behauptung zu hören, ihre Rassen seien 'so schnell, dass schon Kriege um sie geführt wurden'. Auch wenn man solchen Behauptungen zu Recht misstrauisch gegenüberstehen sollte, haben die Männer von Chiwa tatsächlich Recht – ob sie es nun wissen oder nicht. Vor Tausenden von Jahren züchteten die turkmenischen Stammesangehörigen Pferde, deren Schnelligkeit, Widerstandsfähigkeit, Ausdauer und Eignung für den berittenen Bogenschuss unübertroffen waren. Han-chinesische Kaiser nannten diese Rasse das "himmlische Pferd" und führten Krieg gegen die alte skythische Oase mit dem ausdrücklichen Ziel, genügend dieser "himmlischen Pferde" zu rauben, um ihren eigenen Zuchtbestand zu verbessern. Viel später nannten die Russen diese Pferde Argamaks oder "göttliche Pferde" und hoben dabei ihre Schnelligkeit, Ausdauer und Treue hervor. Von diesen turkmenischen Pferden bevorzugt jeder Stamm bestimmte Eigenschaften, wodurch das Yomud-Pferd, das Tekke, das Goklan und das Nokhorli entstanden; die Abstammung jedes einzelnen Pferdes wird in mündlichen Stammbaumüberlieferungen festgehalten. Während allgemein die Ansicht vorherrscht, dass die Yomud- und die Goklan-Pferde aufgrund ihres leichteren Körperbaus die schnellsten sind, verfügen die Tekke-Pferde über die größte Ausdauer, die nur mit den besten reinrassigen Arabern vergleichbar ist. Junaid Khan hat es sich persönlich zur Aufgabe gemacht, in die Pferdezucht des Khanats zu investieren, da die turkmenischen Rassen ihm in zweierlei Hinsicht dienen: Ihr heimlicher Verkauf an interessierte europäische Adlige trägt dazu bei, westliches Kapital in die Stadt zu bringen, während ihre Fähigkeiten als Wüstenkriegspferde unübertroffen sind. Natürlich werden die Yomuds, die zusammen mit dem jungen Junaid Khan auf den Weiden am Aralsee aufgezogen wurden, von Serdar-Karim bevorzugt und füllen die Ställe sowohl der Basare als auch der Kasernen."
khiva_events.1008.a: "Unsere Soldaten werden zum Sieg reiten!"
khiva_events.1008.b: "Sie sind das Rückgrat unserer Logistik!"

khiva_events.1009.t: "Unehrliche Verwalter"
khiva_events.1009.d: "Langweilige Verwaltungsangelegenheiten waren noch nie Junaid Khans Stärke. Was ein guter Anführer tut, um eine solche bekannte Schwäche auszugleichen, ist, Aufgaben zu delegieren, und genau das hat unser bescheidener Anführer getan. Leider haben sich die Personen, die die Verwaltung an seiner Stelle übernommen haben, als kompetenter als ehrlich erwiesen.\n\nDie Regierung funktioniert zwar recht gut, neigt jedoch dazu, ihre Prioritäten langsam auf Angelegenheiten zu verlagern, die diese unersetzlichen Beamten für wichtig halten, wodurch staatliche Ressourcen in die Taschen skrupelloser Personen fließen. Da Junaid weder ein Händchen für Buchhaltung noch Interesse an der Aufsicht hat, hat er wenig unternommen, um diese Verwaltungsbeamten zu entmachten, und die Schuldigen bleiben unter ihren Kadern verborgen und fest in ihren Ämtern verankert."
khiva_events.1009.a: "Findet sie und vernichtet sie!"
khiva_events.1009.b: "Bisher haben sie uns gute Dienste geleistet..."

khiva_events.1010.t: "Aziz Khans Botschaft präzisieren"
khiva_events.1010.d: "Nur wenige beneiden Aziz Khan um seine Rolle in Junaid Khans Regierung, in der er die Regierungsgeschäfte am Laufen hält, während Junaid Khan durch die Steppen streift. Während des Bürgerkriegs geriet dieser besonnene Kurbashi wiederholt mit seinem turkmenischen Oberbefehlshaber aneinander und stritt über die Ausrichtung des Staates Chiwa sowie über Junaid Khans wiederholte Beherbergung und Unterstützung von Aziz Khans engstem Rivalen Oraz Geldy. Als Junaid Khan und Oraz Geldy begannen, wahllos Lebensmittel von der Bevölkerung zu beschlagnahmen, die sie angeblich beschützen sollten, richtete Aziz Khan seine Waffen auf Oraz Geldy und hätte sich beinahe von diesen beiden turkmenischen Basmachi losgesagt, um sich der sowjetischen Sache anzuschließen – was ihm von seinen russischen Gegnern den spöttischen Spitznamen 'turkmenischer Machno' einbrachte, einen Spitznamen, den Aziz Khan sich seitdem zu Herzen genommen hat.\n\nMit dem Ende der Kämpfe in Chiwa erkannte Junaid Khan zunehmend den Wert seines eher auf Verwaltungsaufgaben ausgerichteten Stellvertreters – während Oraz Geldy weiterhin die lokale Bevölkerung und wichtige Interessengruppen terrorisierte und schikanierte, bemühte sich Aziz Khan darum, einen Anschein von kultureller und politischer Einheit unter den ländlichen Turkmenen zu schaffen, in deren Mittelpunkt Junaid Khan als großer Einiger und Beschützer des turkmenischen Volkes stand. Trotz erheblicher Rückschläge, darunter Junaid Khans Desinteresse an einer sinnvollen Zusammenarbeit mit den Nicht-Yomut-Stämmen, ist die Bevölkerung von Chiwa offen für ein neues, vom Staat geschaffenes Bild ihres Führers. Die einzige Frage, die noch offen bleibt, ist, welcher Aspekt von Junaid Khans Charakter im Mittelpunkt dieser neuen Propagandakampagne stehen wird."
khiva_events.1010.a: "Junaid Khan ist ein Held, der 100 gottlose Heiden eigenhändig erschlagen hat!"
khiva_events.1010.b: "Er ist der Vater aller Turkmenen, unabhängig von Stamm oder Sippe!"

khiva_events.1011.t: "Der letzte Hieb in der Nacht"
khiva_events.1011.d: "Als Junaid Khan und seine Verbündeten den hinterhältigen Versuch des Khivan-Khans aufdeckten, seinen treuesten und furchterregendsten Befehlshaber zu töten, war es nur eine Frage der Zeit, bis er und seine Familie von Schlangen endgültig beseitigt würden. Monatelang wurde die königliche Familie streng überwacht, ihre Kontakte kartiert und katalogisiert und ihre Bewegungen verfolgt. Sobald das volle Ausmaß der Verschwörung festgestellt worden war, arbeiteten Eshi Khan, Junaid Khans Sohn, und Aziz Khan unermüdlich daran, eine Nacht der Messer zu organisieren, in der die verräterische Qungrat-Schlange endgültig enthauptet werden sollte. In einer mondlosen Nacht begannen diese Männer ihr blutiges Werk, gingen von Tür zu Tür, richteten die Feinde des Serdar Karim hin und nahmen diejenigen gefangen, mit denen er weiter sprechen wollte. Früh in der Nacht stürmten sie den prächtigen Palast, fanden den Khan inmitten seines stark geschrumpften Harems und schlugen ihn auf unwürdige Weise nieder, als er aus dem Raum floh; sie ließen seine nackte Leiche in der Halle zurück, bevor sie wieder in die Stadt hinabstürzten, um ihr grausames Werk zu vollenden. Als sie fertig waren, waren mehr als hundert Männer getötet worden, viele von ihnen die mächtigsten Bürokraten und Verwaltungsbeamten der Stadt. Das spielt keine Rolle, denn ein fähiger Verräter ist für den Staat weitaus gefährlicher als ein loyaler Unfähiger."
khiva_events.1011.a: "Tod allen Verrätern!"

khiva_events.1012.t: "Ein neuer Khan in Chiwa"
khiva_events.1012.d: "Die Krönung von Junaid Khan war eine schlichte Angelegenheit, die den bescheidenen Mann widerspiegelte, der sich von seiner herausragenden Stellung innerhalb des Stammes emporgearbeitet hatte, um sich zum Khan von ganz Turkestan zu erklären. Für manche gab es Fragen hinsichtlich des Titels, den er für sich selbst wählen würde. Die von ihm abgesetzte Qungrat-Dynastie hatte ihre Legitimität aus ihrer Geschichte als Familie aller großen mongolischen Gemahlinnen abgeleitet (Dschingis Khans Mutter, Urgroßmutter und erste Frau waren Mitglieder des Qungrat-Clans) und klammerte sich daher fest an den Titel des Khans und das Erbe der Mongolei, während die bukharische Manghud-Dynastie 'Khan' zugunsten des islamischen Titels 'Emir' aufgegeben, was zum großen Teil auf ihre sehr schwachen Verbindungen zu Dschingis Khan und seinem Reich zurückzuführen war. Junaid Khans eigener Clan, die Yomuts, hat kaum bis gar keine Verbindung zu Dschingis Khans Reich, was seine Wahl des Titels Khan gelinde gesagt interessant macht. Sollte es unter der Menge, die sich in den prächtigen Sälen des Palasts von Chiwa versammelt hatte, jemanden gegeben haben, der Einwände gegen die Verwendung des Titels hatte, so wagte er es nicht, sich zu Wort zu melden. Stattdessen schritten die Mullahs, Kaufleute, Militärs und Häuptlinge durch die Säle, um dem neuen Khan und seinem Sohn ihre Aufwartung zu machen, Treueeide zu schwören und sich tief vor ihrem neuen Oberherrn zu verneigen. In den Flügeln der Halle beobachteten Botschafter fremder Länder die Prozession und wurden ihrerseits von misstrauischen turkmenischen Kriegern genau beobachtet. Anders als die Qungrats vor ihnen hat diese neue Yomut-Dynastie kein Interesse daran, die Schoßhündchen fremder Kaiser zu sein!"
khiva_events.1012.a: "Eine neue Dynastie, ein neues Kapitel!"

khiva_events.1013.t: "Die Frage der Königlichen Garde"
khiva_events.1013.d: "Als Junaid Khan die königliche Diktatur von Isfandiyar Khan zerschlug, tötete er den unfähigen Khan in den Gärten seines Palastes und setzte an seine Stelle seinen Bruder Sayid Abdullah. In den unruhigen Tagen, die darauf folgten, wurden einige der korruptesten und bösartigsten Berater des verstorbenen Khans hingerichtet oder ins Exil geschickt, doch die überwiegende Mehrheit der Qungrat-Verwandten der königlichen Familie blieb verschont und behielt ihre Macht- und Prominenzpositionen, obwohl einige Schlüsselpositionen stattdessen an turkmenische Häuptlinge vergeben wurden und kaum Zweifel daran bestanden, dass Junaid Khan nun das Khanat regierte. Bemerkenswert ist, dass die Königliche Garde, eine zentrale Institution der persönlichen Macht des Khans und ein Stolz der Qungrats, aufgelöst und durch turkmenische Wachen ersetzt wurde, die vom neuen Serdar Karim handverlesen worden waren. Diese neuen Wachen dienten eher als Gefängniswärter denn als Beschützer des neuen Khans, schränkten seine Bewegungsfreiheit ein und hielten ihn streng unter Beobachtung.\n\nHeute sind einige führende usbekische Adlige aus Chiwa zu uns gekommen und haben um die Erlaubnis gebeten, eine neue Truppe von Soldaten auszurüsten und zu bewaffnen, die dem Khanat als Wiederbelebung der alten königlichen Garde von Chiwa dienen soll. Diese Männer würden unter dem direkten Kommando von Junaid Khan stehen, dürften jedoch Unteroffiziere aus ihren eigenen Reihen auswählen. Vor allem aber würden sie aus den Usbeken des Amu Darya rekrutiert werden und nicht aus den Turkmenen, die den Großteil der derzeitigen Armee des Khans ausmachen. Diesen Männern kann man niemals voll und ganz vertrauen, aber wir würden uns ziemlich lächerlich machen, wenn wir unsere Mauern unterbesetzt lassen würden, nur wegen unserer Angst und Paranoia gegenüber diesen alten und machtlosen Adligen und ihren Lakaien."
khiva_events.1013.a: "Wer könnte schon zu einer freien Armee Nein sagen? Geben wir ihnen unseren Segen."
khiva_events.1013.b: "Diese alten Männer sind nichts als Schlangen, ignorier sie einfach."

khiva_events.1014.t: "Das Gesindel bewaffnen"
khiva_events.1014.d: "Leider ist es nicht ganz so einfach, eine Bestandsaufnahme unserer jungen lokalen Industrie vorzunehmen, wie nur die drei staatlichen Baumwollentkörnungsanlagen und Werkstätten zusammenzuzählen und dann jene Werkstätten und einfachen Manufakturen hinzuzurechnen, die wir in Kürze von russischen Eigentümern 'ausleihen' wollen. Das Problem sind die Arbeiter, vor allem usbekische Arbeiter aus den Städten Chiwa, die diese kleinen Betriebe am Laufen halten. Im Jahr 1917 wurden diese Männer von ausländischen Unruhestiftern dazu verleitet, den Khan zu unterwerfen und kleinliche Privilegien zu fordern – sie gingen sogar so weit zu behaupten, dass das Volk von Chiwa den Khan beherrsche und nicht umgekehrt. Natürlich erteilten wir ihnen 1918 eine entsprechende Lektion – dass man oft beten sollte, wenn man beabsichtigt, Junaid Khan im Kampf gegenüberzutreten. Was diesen Aufwieglern jedoch an Verstand fehlt, machen sie durch Mut wett. Einige der Mutigsten unter ihnen haben den potenziell tödlichen Schritt gewagt, sich an Junaid Khan zu wenden, um ihn um eines zu bitten: dass den Arbeitern gestattet werde, einen Waffenvorrat anzulegen, damit sie im Falle eines Notfalls in der Hauptstadt als ordentliche Garnison dienen können. Das ist eine absurde Forderung, und selbst sie wissen das – doch sie sind sich auch des drohenden Konflikts in Zentralasien sehr wohl bewusst, und noch mehr, dass Junaid Khan nicht über die Männer und Waffen verfügt, die nötig sind, um Chiwa zu halten. Andererseits: Wenn Junaid Khan die Wahl hätte, seine Hauptstadt entweder den Russen oder den Sozialisten zu überlassen, müsste er diesen Vorschlag ernsthaft in Erwägung ziehen. Diese Arbeiter haben versprochen, die Hälfte der Waffen, die sie kaufen wollen, Junaid Khan selbst zu überlassen, und darüber hinaus, sich jedem Kommandanten oder Offizier unterzuordnen, den er auswählen möchte, aber Junaid Khan weiß es besser – er kann von Glück sagen, wenn er ein paar armselige Gewehre bekommt, und jeder Mann, den er an die Spitze einer Arbeitermiliz stellt, läuft Gefahr, niedergemetzelt zu werden, sobald die Stadt aufgegeben wird."
khiva_events.1014.a: "Ob man sie nun mag oder nicht, wir brauchen sie, um die Mauern zu bewachen!"
khiva_events.1014.b: "Haben wir aus dem Jahr 1918 nichts gelernt? Enthauptet diese Unruhestifter, damit es den anderen eine Warnung sei!"

### Ideas ###
KHI_bandit_kingdom: "Banditenreich"
KHI_bandit_kingdom_desc: "Diejenigen, die Junaid Khan herabsetzen wollen, verweisen auf seine Analphabetismus und seine niedrige Herkunft und behaupten, er sei kaum mehr als ein aufgestiegener Bandit, der ein Königreich von Räubern anführt. Es hilft auch nicht, dass die Armee, die er anführt, eine zusammengewürfelte Ansammlung aus Bauernmilizen, Palastwachen und Stammesreitern ist, die alle geteilte politische Loyalitäten und kaum nennenswerte Disziplin aufweisen. Junaid Khan hat die Wirksamkeit dieser zusammengewürfelten Armee auf dem Schlachtfeld unter Beweis gestellt, auch wenn dies vielleicht eher ein Spiegelbild seiner eigenen persönlichen Fähigkeiten ist. Es gibt jedoch nur eine Sache, die in Chiwa sicher ist, und das ist die Vorrangstellung des Militärs und der eiserne Wille des wahren Khans, dem sie folgen."
KHI_sons_of_oghuz: "Die vielen Söhne von Oghuz"
KHI_sons_of_oghuz_desc: "Die verschiedenen turkmenischen Stämme, von der Oase Choresm bis zum Kaspischen und Aralsee, haben sich noch nie zuvor als ein einziges Volk verstanden. Selbst heute beruht die Einheit der Chiwan-Turkmenen auf einem gemeinsamen Ziel, nicht auf einer gemeinsamen Kultur, Sprache oder geografischen Lage. Junaid Khan wurde unter ihnen zum Helden, als er die vielen unterschiedlichen Stämme vereinte und seine tapferen Krieger zum Sieg über die Bolschewiken führte. Dieser große Sieg reichte aus, um den Aufbau einer einheitlichen turkmenischen Identität in Gang zu setzen, doch die meisten unserer turkmenischen Bürger identifizieren sich nach wie vor in erster Linie mit ihren Stammesgruppen, trotz Junaids Bemühungen, eine einheitliche turkmenische Identität zu fördern."
KHI_sons_of_oghuz_late: "Die vielen Söhne von Oghuz"
KHI_sons_of_oghuz_late_desc: "Die verschiedenen turkmenischen Stämme, von der Oase Choresm bis zum Kaspischen und Aralsee, haben sich nie zuvor als ein einziges Volk verstanden. Selbst heute beruht die Einheit der turkmenischen Chivaner eher auf einem gemeinsamen Ziel und der Hingabe an den großen, edlen Feldherrn als auf einer gemeinsamen Kultur, Sprache oder geografischen Lage. Junaid Khan wurde zu einem Helden unter ihnen, als er die vielen unterschiedlichen Stämme vereinte und seine tapferen Krieger zum Sieg über die Bolschewiken führte. Dieser große Sieg diente als Grundlage für die Schaffung einer einheitlichen turkmenischen Identität, und obwohl sich viele unserer turkmenischen Untertanen nach wie vor in erster Linie mit ihren Stammesgruppen identifizieren, wird Junaid Khan weitgehend als Vater aller Turkmenen angesehen und dient als einigende Figur für diese sich neu bildende ethnische Identität."
KHI_abandoned_infrastructure_1: "Verfallene Infrastruktur"
KHI_abandoned_infrastructure_1_desc: "Die von Stadtbewohnern und Usbeken bewohnten Gebiete sind verfallen – eine Folge der hart durchgesetzten Regierungspolitik von Junaid Khan, der seine Anhänger auf dem Land und die Turkmenen bevorzugte. Ein Großteil der städtischen Infrastruktur von Chiwa wurde aufgrund von Junaid Khans Bevorzugung der turkmenischen Stämme vernachlässigt, doch wir haben begonnen, diese Regionen wieder aufzubauen und zu sanieren, um unser Land ins 20. Jahrhundert zu führen."
KHI_abandoned_infrastructure: "Wiederaufbau der Infrastruktur"
KHI_abandoned_infrastructure_desc: "Die von Stadtbewohnern und Usbeken bewohnten Gebiete sind verfallen – eine Folge der hart durchgesetzten Regierungspolitik von Junaid Khan, der seine Anhänger auf dem Land und die Turkmenen bevorzugte. Ein Großteil der städtischen Infrastruktur von Chiwa wurde aufgrund von Junaid Khans Bevorzugung der turkmenischen Stämme vernachlässigt, doch wir haben begonnen, diese Gebiete wieder aufzubauen und zu sanieren, um unser Land ins 20. Jahrhundert zu führen."
KHI_breadbasket: "Aral-Kornkammer"
KHI_breadbasket_desc: "Chiwa, umgeben von fruchtbarem Land und in der Nähe des reichhaltigen Aralsees gelegen, ist seit langem eine blühende Hochburg in Zentralasien. Obwohl die Kriege und Überfälle der letzten Jahrzehnte die fruchtbaren Felder verwüstet und geplündert hatten, dauerte es nicht lange, bis unsere widerstandsfähigen Untertanen ihnen ihren früheren Glanz zurückgaben. Wir produzieren eine erstaunliche Menge an Nahrungsmitteln, versorgen damit unsere Bürger und füllen unsere Staatskassen durch den Export, doch diese wachsende Abhängigkeit vom Handel macht uns zunehmend anfällig für internationale Instabilität."
