KHI_unfinished_content_tt: "§CIn einem anderen Leben wäre Junaid Khan vielleicht versucht, drastischere Maßnahmen gegen die Städte zu ergreifen, die schutzlos vor ihm liegen. Vorerst wird Junaid Khan jedoch zurückhaltend bleiben – was ihn und seine Familie wahrscheinlich vor dem Untergang bewahren wird.§!"

