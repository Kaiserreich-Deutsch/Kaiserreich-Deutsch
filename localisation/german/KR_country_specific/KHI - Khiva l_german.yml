### Characters ###
KHI_junaid_khan: "Junaid Khan"
KHI_junaid_khan_leader_desc: "§YGeboren:§! §L1857 in Badirkent, Dashoguz, Khanat Chiwa§!\n§YHintergrund:§! §LAls Sohn des mächtigen turkmenischen Stammesführers Hoji Bek aus dem Stamm der Junaid-Yomut stieg der ehrgeizige Muhammad-Kurban in seinem Dorf rasch zu einer führenden Stellung auf und sammelte erste Erfahrungen im gescheiterten Widerstand gegen die russische Eroberung von 1873. Obwohl er weder lesen noch schreiben konnte, erlangte Muhammad unter den turkmenischen Stämmen weitreichenden Ruhm als unparteiischer und gerechter Anführer, nachdem er als Dorfrichter seinen eigenen Cousin zum Tode verurteilt hatte. Unter der Unterdrückung durch den usbekischen Khan von Chiwa, Isfandiyar, und dessen russische Oberherren scharten sich die turkmenischen Häuptlinge um ihn, proklamierten ihn zum Junaid Khan und marschierten auf die Hauptstadt zu. Isfandiyar Khan ernannte Junaid Khan zu seinem Serdar Karim, also zu seinem edlen Befehlshaber, in der Hoffnung, das turkmenische Heer zu besänftigen, lieferte sich jedoch bis zum Sommer 1917 Scharmützel mit seinem Befehlshaber, bis in Chiwa gewalttätige Auseinandersetzungen zwischen den sozialistischen Jungen Chiwanern und den Loyalisten des Khans ausbrachen, was Junaid Khan die Gelegenheit bot, die Stadt endgültig zu erobern.\n\nJunaid Khan ließ den Milchtrinker Isfandiyar hinrichten, setzte seinen gefügigen Bruder Sayid Abdullah als neuen Marionetten-Khan ein und übernahm die Herrschaft über das Khanat als absoluter Militärdiktator. In den folgenden Jahren hat Junaid Khan die rebellischen turkmenischen Stämme niedergeschlagen, die Rote Armee besiegt und riesige Teile des transkaspischen Landes aus russischer Hand erobert. Obwohl er vordergründig ein treuer Diener Moskaus bleibt, zerrt er ständig an der vergoldeten Leine, die ihn im Einflussbereich Russlands hält, und sucht nach einer Gelegenheit, das turkmenische Volk ein für alle Mal von der Fremdherrschaft zu befreien. Junaid Khan mag zwar hochbetagt sein, doch hat er in seinem fortgeschrittenen Alter nichts von seiner Tatkraft eingebüßt, und seine Feinde wissen nur zu gut, dass sie zittern müssen, wenn sie den Klang seiner vorrückenden Hörner hören.§!"
